<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #6b7280; }
  .node-title { font-size: 16px; font-weight: 700; }
  .node-text { font-size: 13px; fill: #374151; }
  .small { font-size: 12px; fill: #6b7280; }
  .formula { font-size: 24px; font-weight: 700; fill: #111827; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
</defs>
<rect width="1200" height="720" fill="#ffffff"/>
<text x="600.0" y="42" text-anchor="middle" class="title">期初本期期末滚动结构图</text>
<text x="600.0" y="66" text-anchor="middle" class="subtitle">期初余额 + 本期增加 - 本期减少 = 期末余额；本期期末变成下期期初</text>
<rect x="85" y="230" width="210" height="120" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="190.0" y="260" text-anchor="middle" class="node-title">期初余额</text>
<text x="190.0" y="288" text-anchor="middle" class="node-text">上一期期末滚入</text>
<text x="190.0" y="310" text-anchor="middle" class="node-text">本期开始的存量</text>
<rect x="365" y="170" width="210" height="105" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="470.0" y="200" text-anchor="middle" class="node-title">本期增加</text>
<text x="470.0" y="228" text-anchor="middle" class="node-text">采购、收款</text>
<text x="470.0" y="250" text-anchor="middle" class="node-text">资产增加或负债增加</text>
<rect x="365" y="330" width="210" height="105" rx="10" ry="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6" filter="url(#shadow)"/>
<text x="470.0" y="360" text-anchor="middle" class="node-title">本期减少</text>
<text x="470.0" y="388" text-anchor="middle" class="node-text">销售出库、付款</text>
<text x="470.0" y="410" text-anchor="middle" class="node-text">资产减少或负债减少</text>
<rect x="665" y="230" width="210" height="120" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="770.0" y="260" text-anchor="middle" class="node-title">期末余额</text>
<text x="770.0" y="288" text-anchor="middle" class="node-text">结账确认</text>
<text x="770.0" y="310" text-anchor="middle" class="node-text">本期结束的存量</text>
<rect x="955" y="230" width="180" height="120" rx="10" ry="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6" filter="url(#shadow)"/>
<text x="1045.0" y="260" text-anchor="middle" class="node-title">下期期初</text>
<text x="1045.0" y="288" text-anchor="middle" class="node-text">期末结转</text>
<text x="1045.0" y="310" text-anchor="middle" class="node-text">下一期起点</text>
<line x1="295" y1="290" x2="365" y2="222" stroke="#16a34a" stroke-width="2.1" fill="none" marker-end="url(#arrow-green)"/>
<rect x="311.0" y="228" width="42" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="332" y="244" text-anchor="middle" class="small">加</text>
<line x1="575" y1="222" x2="665" y2="290" stroke="#16a34a" stroke-width="2.1" fill="none" marker-end="url(#arrow-green)"/>
<line x1="295" y1="290" x2="365" y2="382" stroke="#dc2626" stroke-width="2.1" fill="none" marker-end="url(#arrow-red)"/>
<rect x="311.0" y="344" width="42" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="332" y="360" text-anchor="middle" class="small">减</text>
<line x1="575" y1="382" x2="665" y2="290" stroke="#dc2626" stroke-width="2.1" fill="none" marker-end="url(#arrow-red)"/>
<line x1="875" y1="290" x2="955" y2="290" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="888.0" y="254" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="915" y="270" text-anchor="middle" class="small">结转</text>
<rect x="215" y="520" width="770" height="70" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="600" y="550" text-anchor="middle" class="formula">期初 + 本期增加 - 本期减少 = 期末</text>
</svg>