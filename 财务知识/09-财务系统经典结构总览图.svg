<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 850" width="1400" height="850">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #6b7280; }
  .node-title { font-size: 16px; font-weight: 700; }
  .node-text { font-size: 13px; fill: #374151; }
  .small { font-size: 12px; fill: #6b7280; }
  .formula { font-size: 24px; font-weight: 700; fill: #111827; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
</defs>
<rect width="1400" height="850" fill="#ffffff"/>
<text x="700.0" y="42" text-anchor="middle" class="title">财务系统经典结构总览图</text>
<text x="700.0" y="66" text-anchor="middle" class="subtitle">理解财务系统，可以先理解这条从业务到报表的主链路</text>
<rect x="70" y="335" width="150" height="116" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="145.0" y="365" text-anchor="middle" class="node-title">业务发生</text>
<text x="145.0" y="393" text-anchor="middle" class="node-text">销售、采购、报销</text>
<text x="145.0" y="415" text-anchor="middle" class="node-text">收款、付款、入库</text>
<rect x="270" y="335" width="150" height="116" rx="10" ry="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6" filter="url(#shadow)"/>
<text x="345.0" y="365" text-anchor="middle" class="node-title">业务单据</text>
<text x="345.0" y="393" text-anchor="middle" class="node-text">记录业务事实</text>
<text x="345.0" y="415" text-anchor="middle" class="node-text">保留来源依据</text>
<rect x="470" y="335" width="150" height="116" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="545.0" y="365" text-anchor="middle" class="node-title">财务规则</text>
<text x="545.0" y="393" text-anchor="middle" class="node-text">科目映射</text>
<text x="545.0" y="415" text-anchor="middle" class="node-text">确认时点与金额</text>
<rect x="670" y="335" width="150" height="116" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="745.0" y="365" text-anchor="middle" class="node-title">会计凭证</text>
<text x="745.0" y="393" text-anchor="middle" class="node-text">借方、贷方</text>
<text x="745.0" y="415" text-anchor="middle" class="node-text">有借必有贷</text>
<rect x="870" y="335" width="150" height="116" rx="10" ry="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6" filter="url(#shadow)"/>
<text x="945.0" y="365" text-anchor="middle" class="node-title">账簿</text>
<text x="945.0" y="393" text-anchor="middle" class="node-text">明细账</text>
<text x="945.0" y="415" text-anchor="middle" class="node-text">总账</text>
<rect x="1070" y="335" width="150" height="116" rx="10" ry="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6" filter="url(#shadow)"/>
<text x="1145.0" y="365" text-anchor="middle" class="node-title">期间结账</text>
<text x="1145.0" y="393" text-anchor="middle" class="node-text">检查、锁定</text>
<text x="1145.0" y="415" text-anchor="middle" class="node-text">结转期末</text>
<rect x="1270" y="335" width="150" height="116" rx="10" ry="10" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1.6" filter="url(#shadow)"/>
<text x="1345.0" y="365" text-anchor="middle" class="node-title">报表分析</text>
<text x="1345.0" y="393" text-anchor="middle" class="node-text">三张报表</text>
<text x="1345.0" y="415" text-anchor="middle" class="node-text">经营与风险</text>
<line x1="220" y1="393" x2="270" y2="393" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="420" y1="393" x2="470" y2="393" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="620" y1="393" x2="670" y2="393" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="820" y1="393" x2="870" y2="393" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="1020" y1="393" x2="1070" y2="393" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="1220" y1="393" x2="1270" y2="393" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="218.0" y="357" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="245" y="373" text-anchor="middle" class="small">记录</text>
<rect x="418.0" y="357" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="445" y="373" text-anchor="middle" class="small">翻译</text>
<rect x="618.0" y="357" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="645" y="373" text-anchor="middle" class="small">入账</text>
<rect x="818.0" y="357" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="845" y="373" text-anchor="middle" class="small">汇总</text>
<rect x="1018.0" y="357" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="1045" y="373" text-anchor="middle" class="small">定稿</text>
<rect x="1218.0" y="357" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="1245" y="373" text-anchor="middle" class="small">输出</text>
<rect x="180" y="120" width="250" height="112" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="305.0" y="150" text-anchor="middle" class="node-title">会计恒等式</text>
<text x="305.0" y="178" text-anchor="middle" class="node-text">资产 = 负债 + 权益</text>
<text x="305.0" y="200" text-anchor="middle" class="node-text">所有结果必须平衡</text>
<rect x="575" y="120" width="250" height="112" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="700.0" y="150" text-anchor="middle" class="node-title">权责发生制</text>
<text x="700.0" y="178" text-anchor="middle" class="node-text">按应确认时间入账</text>
<text x="700.0" y="200" text-anchor="middle" class="node-text">不等同于现金收付</text>
<rect x="970" y="120" width="250" height="112" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="1095.0" y="150" text-anchor="middle" class="node-title">期初本期期末</text>
<text x="1095.0" y="178" text-anchor="middle" class="node-text">期初 + 增加 - 减少 = 期末</text>
<text x="1095.0" y="200" text-anchor="middle" class="node-text">结账后滚入下一期</text>
<path d="M305,232 C360,275 525,300 690,335" stroke="#6b7280" stroke-width="1.6" fill="none" marker-end="url(#arrow-gray)" stroke-dasharray="5,3"/>
<path d="M700,232 C700,275 700,300 700,335" stroke="#6b7280" stroke-width="1.6" fill="none" marker-end="url(#arrow-gray)" stroke-dasharray="5,3"/>
<path d="M1095,232 C1060,275 1040,300 1060,335" stroke="#6b7280" stroke-width="1.6" fill="none" marker-end="url(#arrow-gray)" stroke-dasharray="5,3"/>
<rect x="220" y="610" width="960" height="104" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="700" y="645" text-anchor="middle" class="node-title">核心判断</text>
<text x="700" y="675" text-anchor="middle" class="node-text">业务系统提供事实，财务规则决定如何表达，凭证和账簿保证可审计，结账和报表给出稳定结果。</text>
</svg>