<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #6b7280; }
  .node-title { font-size: 16px; font-weight: 700; }
  .node-text { font-size: 13px; fill: #374151; }
  .small { font-size: 12px; fill: #6b7280; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
</defs>
<rect width="1200" height="760" fill="#ffffff"/>
<text x="600.0" y="42" text-anchor="middle" class="title">财务风险雷达图</text>
<text x="600.0" y="66" text-anchor="middle" class="subtitle">风险结构用来发现表面繁荣背后的隐患</text>
<circle cx="600" cy="380" r="78" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6" filter="url(#shadow)"/>
<text x="600" y="375" text-anchor="middle" class="node-title">风险结构</text>
<text x="600" y="402" text-anchor="middle" class="node-text">稳不稳</text>
<rect x="205" y="140" width="190" height="92" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.6" filter="url(#shadow)"/>
<text x="300.0" y="170" text-anchor="middle" class="node-title">应收风险</text>
<text x="300.0" y="198" text-anchor="middle" class="node-text">钱可能收不回</text>
<path d="M600,380 C450.0,380 450.0,186 300,186" stroke="#dc2626" stroke-width="1.8" fill="none" marker-end="url(#arrow-red)"/>
<rect x="500" y="105" width="190" height="92" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.6" filter="url(#shadow)"/>
<text x="595.0" y="135" text-anchor="middle" class="node-title">库存风险</text>
<text x="595.0" y="163" text-anchor="middle" class="node-text">货可能卖不掉</text>
<path d="M600,380 C597.5,380 597.5,151 595,151" stroke="#dc2626" stroke-width="1.8" fill="none" marker-end="url(#arrow-red)"/>
<rect x="795" y="140" width="190" height="92" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.6" filter="url(#shadow)"/>
<text x="890.0" y="170" text-anchor="middle" class="node-title">负债风险</text>
<text x="890.0" y="198" text-anchor="middle" class="node-text">还款压力过大</text>
<path d="M600,380 C745.0,380 745.0,186 890,186" stroke="#dc2626" stroke-width="1.8" fill="none" marker-end="url(#arrow-red)"/>
<rect x="900" y="405" width="190" height="92" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.6" filter="url(#shadow)"/>
<text x="995.0" y="435" text-anchor="middle" class="node-title">毛利风险</text>
<text x="995.0" y="463" text-anchor="middle" class="node-text">赚钱能力变弱</text>
<path d="M600,380 C797.5,380 797.5,451 995,451" stroke="#dc2626" stroke-width="1.8" fill="none" marker-end="url(#arrow-red)"/>
<rect x="625" y="590" width="190" height="92" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.6" filter="url(#shadow)"/>
<text x="720.0" y="620" text-anchor="middle" class="node-title">现金流风险</text>
<text x="720.0" y="648" text-anchor="middle" class="node-text">靠借钱续命</text>
<path d="M600,380 C660.0,380 660.0,636 720,636" stroke="#dc2626" stroke-width="1.8" fill="none" marker-end="url(#arrow-red)"/>
<rect x="260" y="505" width="190" height="92" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.6" filter="url(#shadow)"/>
<text x="355.0" y="535" text-anchor="middle" class="node-title">客户集中风险</text>
<text x="355.0" y="563" text-anchor="middle" class="node-text">大客户流失冲击大</text>
<path d="M600,380 C477.5,380 477.5,551 355,551" stroke="#dc2626" stroke-width="1.8" fill="none" marker-end="url(#arrow-red)"/>
<text x="600" y="710" text-anchor="middle" class="subtitle">风险分析不是否定利润，而是判断利润和家底是否可持续。</text>
</svg>