<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #6b7280; }
  .node-title { font-size: 16px; font-weight: 700; }
  .node-text { font-size: 13px; fill: #374151; }
  .small { font-size: 12px; fill: #6b7280; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
</defs>
<rect width="1200" height="800" fill="#ffffff"/>
<text x="600.0" y="42" text-anchor="middle" class="title">结账检查清单图</text>
<text x="600.0" y="66" text-anchor="middle" class="subtitle">结账不是关闭按钮，而是一组完整性检查和结果锁定</text>
<rect x="95" y="145" width="185" height="110" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="187.5" y="175" text-anchor="middle" class="node-title">单据完成</text>
<text x="187.5" y="203" text-anchor="middle" class="node-text">业务单据已审核</text>
<text x="187.5" y="225" text-anchor="middle" class="node-text">异常单据已处理</text>
<rect x="370" y="145" width="185" height="110" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="462.5" y="175" text-anchor="middle" class="node-title">收入成本确认</text>
<text x="462.5" y="203" text-anchor="middle" class="node-text">收入归属正确</text>
<text x="462.5" y="225" text-anchor="middle" class="node-text">成本已结转</text>
<rect x="645" y="145" width="185" height="110" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="737.5" y="175" text-anchor="middle" class="node-title">库存成本</text>
<text x="737.5" y="203" text-anchor="middle" class="node-text">出入库完整</text>
<text x="737.5" y="225" text-anchor="middle" class="node-text">成本计算完成</text>
<rect x="920" y="145" width="185" height="110" rx="10" ry="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6" filter="url(#shadow)"/>
<text x="1012.5" y="175" text-anchor="middle" class="node-title">应收应付</text>
<text x="1012.5" y="203" text-anchor="middle" class="node-text">往来账生成</text>
<text x="1012.5" y="225" text-anchor="middle" class="node-text">核销状态清楚</text>
<rect x="220" y="420" width="185" height="110" rx="10" ry="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6" filter="url(#shadow)"/>
<text x="312.5" y="450" text-anchor="middle" class="node-title">凭证与余额</text>
<text x="312.5" y="478" text-anchor="middle" class="node-text">凭证已生成</text>
<text x="312.5" y="500" text-anchor="middle" class="node-text">余额可结转</text>
<rect x="495" y="420" width="185" height="110" rx="10" ry="10" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1.6" filter="url(#shadow)"/>
<text x="587.5" y="450" text-anchor="middle" class="node-title">报表输出</text>
<text x="587.5" y="478" text-anchor="middle" class="node-text">报表可固定</text>
<text x="587.5" y="500" text-anchor="middle" class="node-text">口径一致</text>
<rect x="770" y="420" width="185" height="110" rx="10" ry="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6" filter="url(#shadow)"/>
<text x="862.5" y="450" text-anchor="middle" class="node-title">期间锁定</text>
<text x="862.5" y="478" text-anchor="middle" class="node-text">禁止普通修改</text>
<text x="862.5" y="500" text-anchor="middle" class="node-text">形成下期期初</text>
<line x1="280" y1="200" x2="370" y2="200" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="555" y1="200" x2="645" y2="200" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="830" y1="200" x2="920" y2="200" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
<path d="M1012,255 L1012,335 L312,335 L312,420" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="405" y1="475" x2="495" y2="475" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="680" y1="475" x2="770" y2="475" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="315" y="645" width="570" height="70" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="600" y="675" text-anchor="middle" class="node-title">结账结果</text>
<text x="600" y="700" text-anchor="middle" class="node-text">确认本期结果，锁定历史数据，生成下一期间稳定起点。</text>
</svg>