<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #6b7280; }
  .node-title { font-size: 16px; font-weight: 700; }
  .node-text { font-size: 13px; fill: #374151; }
  .small { font-size: 12px; fill: #6b7280; }
  .formula { font-size: 24px; font-weight: 700; fill: #111827; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
</defs>
<rect width="1200" height="760" fill="#ffffff"/>
<text x="600.0" y="42" text-anchor="middle" class="title">存货成本与毛利结构图</text>
<text x="600.0" y="66" text-anchor="middle" class="subtitle">有库存的企业，必须理解入库、出库、成本结转和毛利</text>
<rect x="85" y="210" width="190" height="105" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="180.0" y="240" text-anchor="middle" class="node-title">采购入库</text>
<text x="180.0" y="268" text-anchor="middle" class="node-text">库存数量增加</text>
<text x="180.0" y="290" text-anchor="middle" class="node-text">库存成本增加</text>
<rect x="355" y="210" width="190" height="105" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="450.0" y="240" text-anchor="middle" class="node-title">库存</text>
<text x="450.0" y="268" text-anchor="middle" class="node-text">存量资产</text>
<text x="450.0" y="290" text-anchor="middle" class="node-text">等待销售或消耗</text>
<rect x="625" y="210" width="190" height="105" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="720.0" y="240" text-anchor="middle" class="node-title">销售出库</text>
<text x="720.0" y="268" text-anchor="middle" class="node-text">库存减少</text>
<text x="720.0" y="290" text-anchor="middle" class="node-text">触发成本结转</text>
<rect x="895" y="210" width="190" height="105" rx="10" ry="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6" filter="url(#shadow)"/>
<text x="990.0" y="240" text-anchor="middle" class="node-title">销售成本</text>
<text x="990.0" y="268" text-anchor="middle" class="node-text">进入利润表</text>
<text x="990.0" y="290" text-anchor="middle" class="node-text">影响毛利</text>
<line x1="275" y1="262" x2="355" y2="262" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="545" y1="262" x2="625" y2="262" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="815" y1="262" x2="895" y2="262" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="355" y="470" width="190" height="105" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="450.0" y="500" text-anchor="middle" class="node-title">销售收入</text>
<text x="450.0" y="528" text-anchor="middle" class="node-text">售价形成收入</text>
<text x="450.0" y="550" text-anchor="middle" class="node-text">进入利润表</text>
<rect x="625" y="470" width="190" height="105" rx="10" ry="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6" filter="url(#shadow)"/>
<text x="720.0" y="500" text-anchor="middle" class="node-title">毛利</text>
<text x="720.0" y="528" text-anchor="middle" class="node-text">销售收入 - 销售成本</text>
<text x="720.0" y="550" text-anchor="middle" class="node-text">判断产品赚钱能力</text>
<line x1="545" y1="522" x2="625" y2="522" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#arrow-green)"/>
<path d="M990,315 C950,430 800,452 710,470" stroke="#dc2626" stroke-width="2.0" fill="none" marker-end="url(#arrow-red)"/>
<rect x="810.0" y="419" width="110" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="865" y="435" text-anchor="middle" class="small">成本扣减收入</text>
<rect x="210" y="650" width="780" height="50" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="600" y="682" text-anchor="middle" class="node-text">没有成本结转，就无法准确计算毛利和利润。</text>
</svg>