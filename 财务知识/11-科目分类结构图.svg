<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #6b7280; }
  .node-title { font-size: 16px; font-weight: 700; }
  .node-text { font-size: 13px; fill: #374151; }
  .small { font-size: 12px; fill: #6b7280; }
  .formula { font-size: 24px; font-weight: 700; fill: #111827; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
</defs>
<rect width="1200" height="780" fill="#ffffff"/>
<text x="600.0" y="42" text-anchor="middle" class="title">科目分类结构图</text>
<text x="600.0" y="66" text-anchor="middle" class="subtitle">科目是财务系统的分类语言，业务最终要翻译到科目</text>
<rect x="475" y="120" width="250" height="100" rx="10" ry="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6" filter="url(#shadow)"/>
<text x="600.0" y="150" text-anchor="middle" class="node-title">会计科目</text>
<text x="600.0" y="178" text-anchor="middle" class="node-text">财务分类语言</text>
<text x="600.0" y="200" text-anchor="middle" class="node-text">连接业务与报表</text>
<rect x="70" y="350" width="160" height="118" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="150.0" y="380" text-anchor="middle" class="node-title">资产类</text>
<text x="150.0" y="408" text-anchor="middle" class="node-text">现金、银行存款</text>
<text x="150.0" y="430" text-anchor="middle" class="node-text">应收、库存、固定资产</text>
<path d="M600,220 C600,290 150,290 150,350" stroke="#2563eb" stroke-width="1.7" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="300" y="350" width="160" height="118" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="380.0" y="380" text-anchor="middle" class="node-title">负债类</text>
<text x="380.0" y="408" text-anchor="middle" class="node-text">应付、贷款</text>
<text x="380.0" y="430" text-anchor="middle" class="node-text">预收、合同负债</text>
<path d="M600,220 C600,290 380,290 380,350" stroke="#2563eb" stroke-width="1.7" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="530" y="350" width="160" height="118" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="610.0" y="380" text-anchor="middle" class="node-title">权益类</text>
<text x="610.0" y="408" text-anchor="middle" class="node-text">实收资本</text>
<text x="610.0" y="430" text-anchor="middle" class="node-text">未分配利润</text>
<path d="M600,220 C600,290 610,290 610,350" stroke="#2563eb" stroke-width="1.7" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="760" y="350" width="160" height="118" rx="10" ry="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6" filter="url(#shadow)"/>
<text x="840.0" y="380" text-anchor="middle" class="node-title">收入类</text>
<text x="840.0" y="408" text-anchor="middle" class="node-text">主营业务收入</text>
<text x="840.0" y="430" text-anchor="middle" class="node-text">其他业务收入</text>
<path d="M600,220 C600,290 840,290 840,350" stroke="#2563eb" stroke-width="1.7" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="990" y="350" width="160" height="118" rx="10" ry="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6" filter="url(#shadow)"/>
<text x="1070.0" y="380" text-anchor="middle" class="node-title">成本费用类</text>
<text x="1070.0" y="408" text-anchor="middle" class="node-text">销售成本</text>
<text x="1070.0" y="430" text-anchor="middle" class="node-text">管理/销售/财务费用</text>
<path d="M600,220 C600,290 1070,290 1070,350" stroke="#2563eb" stroke-width="1.7" fill="none" marker-end="url(#arrow-blue)"/>
<text x="330" y="585" text-anchor="end" class="node-text">销售单</text>
<line x1="350" y1="581" x2="430" y2="581" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-gray)"/>
<text x="455" y="585" class="node-text">主营业务收入 / 应收账款</text>
<text x="330" y="627" text-anchor="end" class="node-text">采购入库</text>
<line x1="350" y1="623" x2="430" y2="623" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-gray)"/>
<text x="455" y="627" class="node-text">库存商品 / 应付账款</text>
<text x="330" y="669" text-anchor="end" class="node-text">支付工资</text>
<line x1="350" y1="665" x2="430" y2="665" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-gray)"/>
<text x="455" y="669" class="node-text">费用 / 银行存款</text>
</svg>