<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #6b7280; }
  .node-title { font-size: 16px; font-weight: 700; }
  .node-text { font-size: 13px; fill: #374151; }
  .small { font-size: 12px; fill: #6b7280; }
  .formula { font-size: 24px; font-weight: 700; fill: #111827; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
</defs>
<rect width="1200" height="760" fill="#ffffff"/>
<text x="600.0" y="42" text-anchor="middle" class="title">权责发生制结构图</text>
<text x="600.0" y="66" text-anchor="middle" class="subtitle">收入费用按应确认时间入账，不一定等于现金收付时间</text>
<rect x="80" y="155" width="220" height="105" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="190.0" y="185" text-anchor="middle" class="node-title">先销售后收款</text>
<text x="190.0" y="213" text-anchor="middle" class="node-text">确认收入</text>
<text x="190.0" y="235" text-anchor="middle" class="node-text">形成应收账款</text>
<rect x="490" y="155" width="220" height="105" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="600.0" y="185" text-anchor="middle" class="node-title">后来收款</text>
<text x="600.0" y="213" text-anchor="middle" class="node-text">现金增加</text>
<text x="600.0" y="235" text-anchor="middle" class="node-text">核销应收</text>
<line x1="300" y1="207" x2="490" y2="207" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="360.0" y="171" width="70" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="395" y="187" text-anchor="middle" class="small">时间差</text>
<rect x="80" y="365" width="220" height="105" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="190.0" y="395" text-anchor="middle" class="node-title">先付款后受益</text>
<text x="190.0" y="423" text-anchor="middle" class="node-text">形成资产/待摊</text>
<text x="190.0" y="445" text-anchor="middle" class="node-text">不一定马上进费用</text>
<rect x="490" y="365" width="220" height="105" rx="10" ry="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6" filter="url(#shadow)"/>
<text x="600.0" y="395" text-anchor="middle" class="node-title">以后逐期消耗</text>
<text x="600.0" y="423" text-anchor="middle" class="node-text">摊销或折旧</text>
<text x="600.0" y="445" text-anchor="middle" class="node-text">进入费用</text>
<line x1="300" y1="417" x2="490" y2="417" stroke="#ea580c" stroke-width="2.2" fill="none" marker-end="url(#arrow-orange)"/>
<rect x="351.0" y="381" width="88" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="395" y="397" text-anchor="middle" class="small">分期确认</text>
<rect x="840" y="250" width="240" height="150" rx="10" ry="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6" filter="url(#shadow)"/>
<text x="960.0" y="280" text-anchor="middle" class="node-title">核心区别</text>
<text x="960.0" y="308" text-anchor="middle" class="node-text">利润看应确认</text>
<text x="960.0" y="330" text-anchor="middle" class="node-text">现金看已收付</text>
<text x="960.0" y="352" text-anchor="middle" class="node-text">两者经常不同</text>
<path d="M710,207 C770,225 795,270 840,300" stroke="#9333ea" stroke-width="1.8" fill="none" marker-end="url(#arrow-purple)"/>
<path d="M710,417 C770,400 795,360 840,335" stroke="#9333ea" stroke-width="1.8" fill="none" marker-end="url(#arrow-purple)"/>
<rect x="210" y="595" width="780" height="70" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="600" y="625" text-anchor="middle" class="node-title">记忆</text>
<text x="600" y="650" text-anchor="middle" class="node-text">权责发生制解释了为什么利润和现金流经常不一样。</text>
</svg>