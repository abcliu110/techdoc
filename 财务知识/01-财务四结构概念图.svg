<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #6b7280; }
  .node-title { font-size: 16px; font-weight: 700; }
  .node-text { font-size: 13px; fill: #374151; }
  .small { font-size: 12px; fill: #6b7280; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
</defs>
<rect width="1200" height="760" fill="#ffffff"/>
<text x="600.0" y="42" text-anchor="middle" class="title">财务四结构概念图</text>
<text x="600.0" y="66" text-anchor="middle" class="subtitle">先看整体：有多少、怎么赚、到没到账、稳不稳</text>
<rect x="488" y="300" width="224" height="122" rx="10" ry="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6" filter="url(#shadow)"/>
<text x="600.0" y="330" text-anchor="middle" class="node-title">财务分析</text>
<text x="600.0" y="358" text-anchor="middle" class="node-text">判断一门生意</text>
<text x="600.0" y="380" text-anchor="middle" class="node-text">如何创造和沉淀价值</text>
<rect x="100" y="120" width="250" height="118" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="225.0" y="150" text-anchor="middle" class="node-title">家底结构</text>
<text x="225.0" y="178" text-anchor="middle" class="node-text">资产 - 负债 = 净资产</text>
<text x="225.0" y="200" text-anchor="middle" class="node-text">底子厚不厚</text>
<rect x="850" y="120" width="250" height="118" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="975.0" y="150" text-anchor="middle" class="node-title">赚钱结构</text>
<text x="975.0" y="178" text-anchor="middle" class="node-text">收入 - 成本 - 费用 = 利润</text>
<text x="975.0" y="200" text-anchor="middle" class="node-text">利润怎么来</text>
<rect x="100" y="520" width="250" height="118" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="225.0" y="550" text-anchor="middle" class="node-title">现金结构</text>
<text x="225.0" y="578" text-anchor="middle" class="node-text">利润有没有变真钱</text>
<text x="225.0" y="600" text-anchor="middle" class="node-text">现金决定能不能活</text>
<rect x="850" y="520" width="250" height="118" rx="10" ry="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6" filter="url(#shadow)"/>
<text x="975.0" y="550" text-anchor="middle" class="node-title">风险结构</text>
<text x="975.0" y="578" text-anchor="middle" class="node-text">哪里可能出问题</text>
<text x="975.0" y="600" text-anchor="middle" class="node-text">稳不稳、能否持续</text>
<path d="M350,179 C450,210 470,260 498,306" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
<path d="M850,179 C750,210 730,260 702,306" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
<path d="M350,579 C450,550 470,470 498,416" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
<path d="M850,579 C750,550 730,470 702,416" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
<text x="600" y="700" text-anchor="middle" class="subtitle">四个结构要一起看：家底厚但不赚钱是在吃老本；赚钱多但没现金可能收不回钱。</text>
</svg>