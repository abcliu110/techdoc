<line x1="700" y1="474" x2="760" y2="474" stroke="#ea580c" stroke-width="2.1" fill="none" marker-end="url(#arrow-orange)"/>
<line x1="930" y1="474" x2="990" y2="474" stroke="#ea580c" stroke-width="2.1" fill="none" marker-end="url(#arrow-orange)"/>
<text x="650" y="120" text-anchor="middle" class="node-title">应收链路</text>
<text x="650" y="390" text-anchor="middle" class="node-title">应付链路</text>
