<text x="615.0" y="488" text-anchor="middle" class="node-text">现金流出</text>
<rect x="760" y="430" width="170" height="88" rx="10" ry="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6" filter="url(#shadow)"/>
<text x="845.0" y="460" text-anchor="middle" class="node-title">核销</text>
<text x="845.0" y="488" text-anchor="middle" class="node-text">配对应付和付款</text>
