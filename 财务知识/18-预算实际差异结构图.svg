<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #6b7280; }
  .node-title { font-size: 16px; font-weight: 700; }
  .node-text { font-size: 13px; fill: #374151; }
  .small { font-size: 12px; fill: #6b7280; }
  .formula { font-size: 24px; font-weight: 700; fill: #111827; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
</defs>
<rect width="1200" height="720" fill="#ffffff"/>
<text x="600.0" y="42" text-anchor="middle" class="title">预算实际差异结构图</text>
<text x="600.0" y="66" text-anchor="middle" class="subtitle">管理财务常用结构：预算、实际、差异、原因、行动</text>
<rect x="90" y="260" width="190" height="110" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="185.0" y="290" text-anchor="middle" class="node-title">预算数</text>
<text x="185.0" y="318" text-anchor="middle" class="node-text">事前目标</text>
<text x="185.0" y="340" text-anchor="middle" class="node-text">计划花多少/赚多少</text>
<rect x="370" y="260" width="190" height="110" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="465.0" y="290" text-anchor="middle" class="node-title">实际数</text>
<text x="465.0" y="318" text-anchor="middle" class="node-text">真实发生</text>
<text x="465.0" y="340" text-anchor="middle" class="node-text">本期经营结果</text>
<rect x="650" y="260" width="190" height="110" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="745.0" y="290" text-anchor="middle" class="node-title">差异</text>
<text x="745.0" y="318" text-anchor="middle" class="node-text">实际 - 预算</text>
<text x="745.0" y="340" text-anchor="middle" class="node-text">有利或不利</text>
<rect x="930" y="260" width="190" height="110" rx="10" ry="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6" filter="url(#shadow)"/>
<text x="1025.0" y="290" text-anchor="middle" class="node-title">原因与行动</text>
<text x="1025.0" y="318" text-anchor="middle" class="node-text">解释差异</text>
<text x="1025.0" y="340" text-anchor="middle" class="node-text">调整经营动作</text>
<line x1="280" y1="315" x2="370" y2="315" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="560" y1="315" x2="650" y2="315" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="840" y1="315" x2="930" y2="315" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="298.0" y="279" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="325" y="295" text-anchor="middle" class="small">对比</text>
<rect x="578.0" y="279" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="605" y="295" text-anchor="middle" class="small">计算</text>
<rect x="858.0" y="279" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="885" y="295" text-anchor="middle" class="small">分析</text>
<rect x="220" y="500" width="760" height="70" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="600" y="530" text-anchor="middle" class="node-title">例</text>
<text x="600" y="555" text-anchor="middle" class="node-text">预算房租 10 万，实际 12 万，差异 2 万；原因可能是新增门店或租金上涨。</text>
</svg>