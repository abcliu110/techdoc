<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #6b7280; }
  .node-title { font-size: 16px; font-weight: 700; }
  .node-text { font-size: 13px; fill: #374151; }
  .small { font-size: 12px; fill: #6b7280; }
  .formula { font-size: 24px; font-weight: 700; fill: #111827; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
</defs>
<rect width="1200" height="780" fill="#ffffff"/>
<text x="600.0" y="42" text-anchor="middle" class="title">凭证到账簿到报表层级图</text>
<text x="600.0" y="66" text-anchor="middle" class="subtitle">凭证是最小核算单元，账簿是汇总层，报表是结果层</text>
<rect x="90" y="140" width="190" height="115" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="185.0" y="170" text-anchor="middle" class="node-title">来源单据</text>
<text x="185.0" y="198" text-anchor="middle" class="node-text">销售单、采购单</text>
<text x="185.0" y="220" text-anchor="middle" class="node-text">付款单、报销单</text>
<rect x="350" y="140" width="190" height="115" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="445.0" y="170" text-anchor="middle" class="node-title">会计凭证</text>
<text x="445.0" y="198" text-anchor="middle" class="node-text">日期、期间、摘要</text>
<text x="445.0" y="220" text-anchor="middle" class="node-text">科目、借方、贷方</text>
<rect x="610" y="140" width="190" height="115" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="705.0" y="170" text-anchor="middle" class="node-title">明细账</text>
<text x="705.0" y="198" text-anchor="middle" class="node-text">按科目/客户/供应商</text>
<text x="705.0" y="220" text-anchor="middle" class="node-text">逐笔记录</text>
<rect x="870" y="140" width="190" height="115" rx="10" ry="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6" filter="url(#shadow)"/>
<text x="965.0" y="170" text-anchor="middle" class="node-title">总账</text>
<text x="965.0" y="198" text-anchor="middle" class="node-text">按科目汇总</text>
<text x="965.0" y="220" text-anchor="middle" class="node-text">余额与发生额</text>
<line x1="280" y1="198" x2="350" y2="198" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="540" y1="198" x2="610" y2="198" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="800" y1="198" x2="870" y2="198" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="250" y="420" width="210" height="115" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="355.0" y="450" text-anchor="middle" class="node-title">利润表</text>
<text x="355.0" y="478" text-anchor="middle" class="node-text">收入、成本、费用</text>
<text x="355.0" y="500" text-anchor="middle" class="node-text">看经营成果</text>
<rect x="495" y="420" width="210" height="115" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="600.0" y="450" text-anchor="middle" class="node-title">资产负债表</text>
<text x="600.0" y="478" text-anchor="middle" class="node-text">资产、负债、权益</text>
<text x="600.0" y="500" text-anchor="middle" class="node-text">看家底</text>
<rect x="740" y="420" width="210" height="115" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="845.0" y="450" text-anchor="middle" class="node-title">现金流量表</text>
<text x="845.0" y="478" text-anchor="middle" class="node-text">现金流入流出</text>
<text x="845.0" y="500" text-anchor="middle" class="node-text">看命脉</text>
<path d="M965,255 C900,335 780,370 600,420" stroke="#9333ea" stroke-width="2.0" fill="none" marker-end="url(#arrow-purple)"/>
<rect x="747.0" y="332" width="126" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="810" y="348" text-anchor="middle" class="small">按报表口径取数</text>
<rect x="195" y="625" width="810" height="68" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="600" y="655" text-anchor="middle" class="node-title">记忆链路</text>
<text x="600" y="680" text-anchor="middle" class="node-text">业务单据 -> 会计凭证 -> 明细账 -> 总账 -> 财务报表。</text>
</svg>