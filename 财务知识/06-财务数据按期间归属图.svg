<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #6b7280; }
  .node-title { font-size: 16px; font-weight: 700; }
  .node-text { font-size: 13px; fill: #374151; }
  .small { font-size: 12px; fill: #6b7280; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
</defs>
<rect width="1200" height="800" fill="#ffffff"/>
<text x="600.0" y="42" text-anchor="middle" class="title">财务数据按期间归属图</text>
<text x="600.0" y="66" text-anchor="middle" class="subtitle">不是所有数据本身按期间，但影响报表的数据最终要归属到会计期间</text>
<rect x="80" y="140" width="230" height="125" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="195.0" y="170" text-anchor="middle" class="node-title">原始业务数据</text>
<text x="195.0" y="198" text-anchor="middle" class="node-text">销售、采购、入库、付款</text>
<text x="195.0" y="220" text-anchor="middle" class="node-text">先按业务发生日期记录</text>
<rect x="360" y="140" width="230" height="125" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="475.0" y="170" text-anchor="middle" class="node-title">会计数据</text>
<text x="475.0" y="198" text-anchor="middle" class="node-text">凭证、收入确认、成本结转</text>
<text x="475.0" y="220" text-anchor="middle" class="node-text">必须归属会计期间</text>
<rect x="640" y="140" width="230" height="125" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="755.0" y="170" text-anchor="middle" class="node-title">报表数据</text>
<text x="755.0" y="198" text-anchor="middle" class="node-text">利润表、资产负债表</text>
<text x="755.0" y="220" text-anchor="middle" class="node-text">按期间输出结果</text>
<rect x="920" y="140" width="210" height="125" rx="10" ry="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6" filter="url(#shadow)"/>
<text x="1025.0" y="170" text-anchor="middle" class="node-title">基础资料</text>
<text x="1025.0" y="198" text-anchor="middle" class="node-text">客户、供应商、商品</text>
<text x="1025.0" y="220" text-anchor="middle" class="node-text">按有效期管理</text>
<line x1="310" y1="203" x2="360" y2="203" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="308.0" y="167" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="335" y="183" text-anchor="middle" class="small">入账</text>
<line x1="590" y1="203" x2="640" y2="203" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#arrow-green)"/>
<rect x="588.0" y="167" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="615" y="183" text-anchor="middle" class="small">汇总</text>
<line x1="870" y1="203" x2="920" y2="203" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arrow-gray)" stroke-dasharray="5,3"/>
<rect x="868.0" y="167" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="895" y="183" text-anchor="middle" class="small">引用</text>
<rect x="120" y="390" width="160" height="86" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.6" filter="url(#shadow)"/>
<text x="200.0" y="420" text-anchor="middle" class="node-title">业务日期</text>
<text x="200.0" y="448" text-anchor="middle" class="node-text">业务实际发生时间</text>
<rect x="320" y="390" width="160" height="86" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.6" filter="url(#shadow)"/>
<text x="400.0" y="420" text-anchor="middle" class="node-title">单据日期</text>
<text x="400.0" y="448" text-anchor="middle" class="node-text">单据创建或填制时间</text>
<rect x="520" y="390" width="160" height="86" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.6" filter="url(#shadow)"/>
<text x="600.0" y="420" text-anchor="middle" class="node-title">审核日期</text>
<text x="600.0" y="448" text-anchor="middle" class="node-text">业务审核通过时间</text>
<rect x="720" y="390" width="160" height="86" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.6" filter="url(#shadow)"/>
<text x="800.0" y="420" text-anchor="middle" class="node-title">会计日期</text>
<text x="800.0" y="448" text-anchor="middle" class="node-text">财务确认入账时间</text>
<rect x="920" y="390" width="160" height="86" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.6" filter="url(#shadow)"/>
<text x="1000.0" y="420" text-anchor="middle" class="node-title">会计期间</text>
<text x="1000.0" y="448" text-anchor="middle" class="node-text">归属哪个财务期间</text>
<line x1="280" y1="433" x2="320" y2="433" stroke="#2563eb" stroke-width="1.7" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="480" y1="433" x2="520" y2="433" stroke="#2563eb" stroke-width="1.7" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="680" y1="433" x2="720" y2="433" stroke="#2563eb" stroke-width="1.7" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="880" y1="433" x2="920" y2="433" stroke="#2563eb" stroke-width="1.7" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="155" y="585" width="890" height="108" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="600" y="620" text-anchor="middle" class="node-title">系统设计口径</text>
<text x="600" y="650" text-anchor="middle" class="node-text">业务数据按发生日期记录；会计数据按会计期间归集；报表数据按期间输出；基础资料按有效期管理。</text>
</svg>