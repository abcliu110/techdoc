<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #6b7280; }
  .node-title { font-size: 16px; font-weight: 700; }
  .node-text { font-size: 13px; fill: #374151; }
  .small { font-size: 12px; fill: #6b7280; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
</defs>
<rect width="1200" height="680" fill="#ffffff"/>
<text x="600.0" y="42" text-anchor="middle" class="title">业务到财务结果流程图</text>
<text x="600.0" y="66" text-anchor="middle" class="subtitle">从本金到经营结果，再到现金和家底变化</text>
<rect x="70" y="250" width="150" height="120" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6" filter="url(#shadow)"/>
<text x="145.0" y="280" text-anchor="middle" class="node-title">资产/本金</text>
<text x="145.0" y="308" text-anchor="middle" class="node-text">钱、设备、库存</text>
<text x="145.0" y="330" text-anchor="middle" class="node-text">经营起点</text>
<rect x="270" y="250" width="150" height="120" rx="10" ry="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6" filter="url(#shadow)"/>
<text x="345.0" y="280" text-anchor="middle" class="node-title">经营活动</text>
<text x="345.0" y="308" text-anchor="middle" class="node-text">采购、生产、销售</text>
<text x="345.0" y="330" text-anchor="middle" class="node-text">履约与服务</text>
<rect x="470" y="250" width="150" height="120" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6" filter="url(#shadow)"/>
<text x="545.0" y="280" text-anchor="middle" class="node-title">收入成本费用</text>
<text x="545.0" y="308" text-anchor="middle" class="node-text">确认收入</text>
<text x="545.0" y="330" text-anchor="middle" class="node-text">归集成本费用</text>
<rect x="670" y="250" width="150" height="120" rx="10" ry="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6" filter="url(#shadow)"/>
<text x="745.0" y="280" text-anchor="middle" class="node-title">利润</text>
<text x="745.0" y="308" text-anchor="middle" class="node-text">赚了还是亏了</text>
<text x="745.0" y="330" text-anchor="middle" class="node-text">利润质量</text>
<rect x="870" y="250" width="150" height="120" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6" filter="url(#shadow)"/>
<text x="945.0" y="280" text-anchor="middle" class="node-title">现金流</text>
<text x="945.0" y="308" text-anchor="middle" class="node-text">回款与付款</text>
<text x="945.0" y="330" text-anchor="middle" class="node-text">现金真实进出</text>
<rect x="1070" y="250" width="150" height="120" rx="10" ry="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6" filter="url(#shadow)"/>
<text x="1145.0" y="280" text-anchor="middle" class="node-title">净资产变化</text>
<text x="1145.0" y="308" text-anchor="middle" class="node-text">家底变厚</text>
<text x="1145.0" y="330" text-anchor="middle" class="node-text">或家底变薄</text>
<line x1="220" y1="310" x2="270" y2="310" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="420" y1="310" x2="470" y2="310" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="620" y1="310" x2="670" y2="310" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="820" y1="310" x2="870" y2="310" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<line x1="1020" y1="310" x2="1070" y2="310" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="218.0" y="274" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="245" y="290" text-anchor="middle" class="small">投入</text>
<rect x="418.0" y="274" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="445" y="290" text-anchor="middle" class="small">做事</text>
<rect x="618.0" y="274" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="645" y="290" text-anchor="middle" class="small">核算</text>
<rect x="818.0" y="274" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="845" y="290" text-anchor="middle" class="small">验证</text>
<rect x="1018.0" y="274" width="54" height="22" rx="5" fill="#ffffff" opacity="0.96"/>
<text x="1045" y="290" text-anchor="middle" class="small">沉淀</text>
<rect x="95" y="470" width="1010" height="92" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="600" y="505" text-anchor="middle" class="node-title">关键理解</text>
<text x="600" y="535" text-anchor="middle" class="node-text">财务不是孤立数字，而是一条经营链路：投入资源，组织经营，形成利润，变成现金，最后改变家底。</text>
</svg>