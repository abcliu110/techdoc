    <text x="1010" y="187" class="node-sub">实体字段转列</text>
    <text x="1010" y="204" class="node-sub">lid 自动索引</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="300" width="240" height="116" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5"/>
    <circle cx="985" cy="328" r="15" fill="#ffffff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="985" y="333" text-anchor="middle" class="badge">DDL</text>
    <text x="1010" y="325" class="node-title">ALTER TABLE</text>
    <text x="1010" y="345" class="node-sub">ADD COLUMN</text>
    <text x="1010" y="362" class="node-sub">MODIFY COLUMN</text>
    <text x="1010" y="379" class="node-sub">ADD INDEX</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="495" width="240" height="98" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5"/>
    <circle cx="985" cy="523" r="15" fill="#ffffff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="985" y="528" text-anchor="middle" class="badge">SQL</text>
    <text x="1010" y="520" class="node-title">Db.updateBySql()</text>
    <text x="1010" y="540" class="node-sub">合并 ALTER</text>
    <text x="1010" y="557" class="node-sub">失败降级逐条执行</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="690" width="240" height="82" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5"/>
    <circle cx="985" cy="718" r="15" fill="#ffffff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="985" y="723" text-anchor="middle" class="badge">OK</text>
    <text x="1010" y="715" class="node-title">更新版本号</text>
    <text x="1010" y="735" class="node-sub">写回 sys_config_data</text>
    <text x="1010" y="752" class="node-sub">POS_VERSION</text>
  </g>
  <line x1="155" y1="239" x2="155" y2="475" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
