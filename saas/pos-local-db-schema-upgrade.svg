    <text x="690" y="715" class="node-sub">Java 类型映射</text>
    <text x="690" y="732" class="node-sub">安全变宽</text>
    <text x="690" y="749" class="node-sub">needToCreateIndex</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="125" width="240" height="108" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5"/>
