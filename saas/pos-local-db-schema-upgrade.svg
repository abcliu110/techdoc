  <path d="M 435,595 C 435,650 500,805 960,731" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow-gray)" stroke-dasharray="6,4"/>
  <rect x="600.0" y="771" width="84" height="21" rx="4" fill="#ffffff" opacity="0.96" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="642" y="786" text-anchor="middle" class="small">版本一致：跳过</text>
  <g>
    <rect x="55" y="840" width="1170" height="54" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.2"/>
    <text x="74" y="862" class="node-title">安全边界</text>
    <text x="168" y="862" class="node-sub">只做正向结构补齐：建表、补列、扩大类型、补索引；不自动删字段、不重命名字段、不做复杂数据迁移。</text>
    <text x="168" y="882" class="node-sub">FullSyncDataService 的 data/sync_temp 是 JSON 同步临时目录，不是建表脚本目录。</text>
  </g>
  <g transform="translate(55, 790)">
    <line x1="0" y1="8" x2="34" y2="8" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
