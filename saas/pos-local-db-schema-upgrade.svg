    <text x="435" y="550" text-anchor="middle" class="small">false 执行升级</text>
    <text x="435" y="565" text-anchor="middle" class="small">true 直接返回</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="640" y="135" width="230" height="90" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
    <circle cx="665" cy="163" r="15" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
    <text x="665" y="168" text-anchor="middle" class="badge">REF</text>
    <text x="690" y="160" class="node-title">扫描实体类</text>
    <text x="690" y="180" class="node-sub">Reflections</text>
    <text x="690" y="197" class="node-sub">BaseEntity 子类</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="640" y="280" width="230" height="98" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
    <circle cx="665" cy="308" r="15" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
    <text x="665" y="313" text-anchor="middle" class="badge">ANN</text>
    <text x="690" y="305" class="node-title">读取注解模型</text>
    <text x="690" y="325" class="node-sub">@Table 表名</text>
    <text x="690" y="342" class="node-sub">@Column 字段</text>
    <text x="690" y="359" class="node-sub">@ColumnPlus 扩展</text>
  </g>
  <g filter="url(#shadow)">
    <polygon points="755,445.0 870.0,505 755,565.0 640.0,505" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="755" y="500" text-anchor="middle" class="node-title">表存在？</text>
    <text x="755" y="520" text-anchor="middle" class="small">不存在：CREATE</text>
    <text x="755" y="535" text-anchor="middle" class="small">存在：ALTER</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="640" y="670" width="230" height="90" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
    <circle cx="665" cy="698" r="15" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
    <text x="665" y="703" text-anchor="middle" class="badge">MAP</text>
