  <text x="918" y="448" text-anchor="middle" class="small">表已存在</text>
  <path d="M 755,625 L 755,670" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="789.0" y="638" width="54" height="21" rx="4" fill="#ffffff" opacity="0.96" stroke="#e5e7eb" stroke-width="0.8"/>
