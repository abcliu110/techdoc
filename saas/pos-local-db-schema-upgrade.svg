<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 920" width="1920" height="1380">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .lane-label { font-size: 12px; font-weight: 700; fill: #374151; letter-spacing: 1px; }
    .node-title { font-size: 15px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 12px; fill: #4b5563; }
    .small { font-size: 11px; fill: #6b7280; }
    .badge { font-size: 11px; font-weight: 700; fill: #1f2937; }
    .legend { font-size: 12px; fill: #4b5563; }
  </style>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1280" height="920" fill="#ffffff"/>
  <text x="640" y="46" text-anchor="middle" class="title">POS 本地数据库自动建表与结构升级机制</text>
  <text x="640" y="70" text-anchor="middle" class="subtitle">VerMgrServer：实体反射 + information_schema 差异对比生成 DDL，不执行 SQL 脚本目录</text>
  <rect x="40" y="100" width="230" height="720" rx="10" fill="#eff6ff" fill-opacity="0.42" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="54" y="124" class="lane-label">触发层</text>
  <rect x="290" y="100" width="300" height="720" rx="10" fill="#fff7ed" fill-opacity="0.42" stroke="#fed7aa" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="304" y="124" class="lane-label">版本与元数据</text>
  <rect x="610" y="100" width="290" height="720" rx="10" fill="#f0fdf4" fill-opacity="0.42" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="624" y="124" class="lane-label">实体反射与差异判断</text>
  <rect x="920" y="100" width="320" height="720" rx="10" fill="#faf5ff" fill-opacity="0.42" stroke="#ddd6fe" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="934" y="124" class="lane-label">DDL 执行与结果</text>
  <g filter="url(#shadow)">
    <rect x="70" y="155" width="170" height="84" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="95" cy="183" r="15" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="95" y="188" text-anchor="middle" class="badge">APP</text>
    <text x="120" y="180" class="node-title">POS 启动</text>
    <text x="120" y="200" class="node-sub">MySQL 可连接后</text>
    <text x="120" y="217" class="node-sub">初始化 MyBatisFlex</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="300" width="170" height="82" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="95" cy="328" r="15" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="95" y="333" text-anchor="middle" class="badge">API</text>
    <text x="120" y="325" class="node-title">手动升级接口</text>
    <text x="120" y="345" class="node-sub">POST /upgrade</text>
    <text x="120" y="362" class="node-sub">upgrade(true)</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="475" width="170" height="96" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
