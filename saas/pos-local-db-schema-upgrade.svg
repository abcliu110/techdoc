  <text x="1137" y="460" text-anchor="middle" class="small">执行 DDL</text>
  <path d="M 1080,593 L 1080,690" fill="none" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="1105.0" y="631" width="54" height="21" rx="4" fill="#ffffff" opacity="0.96" stroke="#e5e7eb" stroke-width="0.8"/>
