    <text x="95" y="508" text-anchor="middle" class="badge">VM</text>
    <text x="120" y="500" class="node-title">VerMgrServer</text>
    <text x="120" y="520" class="node-sub">upgrade(false)</text>
    <text x="120" y="537" class="node-sub">或 upgrade(true)</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="320" y="140" width="230" height="92" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
    <circle cx="345" cy="168" r="15" fill="#ffffff" stroke="#fed7aa" stroke-width="1"/>
    <text x="345" y="173" text-anchor="middle" class="badge">INI</text>
    <text x="370" y="165" class="node-title">读取文件版本</text>
    <text x="370" y="185" class="node-sub">verInfo.ini</text>
    <text x="370" y="202" class="node-sub">POS_VERSION</text>
  </g>
  <g filter="url(#shadow)">
    <ellipse cx="435" cy="300" rx="110.0" ry="14" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
    <rect x="325.0" y="300" width="220" height="102" fill="#f0fdf4" stroke="none"/>
    <line x1="325.0" y1="300" x2="325.0" y2="402" stroke="#86efac" stroke-width="1.5"/>
    <line x1="545.0" y1="300" x2="545.0" y2="402" stroke="#86efac" stroke-width="1.5"/>
