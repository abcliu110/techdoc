    <text x="435" y="334" text-anchor="middle" class="node-title">本地 MySQL</text>
    <text x="435" y="355" text-anchor="middle" class="node-sub">sys_config_data</text>
    <text x="435" y="371" text-anchor="middle" class="node-sub">information_schema</text>
  </g>
  <g filter="url(#shadow)">
    <polygon points="435,475.0 550.0,535 435,595.0 320.0,535" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
