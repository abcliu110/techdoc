  <rect x="791.0" y="404" width="54" height="21" rx="4" fill="#ffffff" opacity="0.96" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="818" y="419" text-anchor="middle" class="small">差异对比</text>
  <path d="M 870,505 L 920,505 L 920,179 L 960,179" fill="none" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="891.0" y="241" width="54" height="21" rx="4" fill="#ffffff" opacity="0.96" stroke="#e5e7eb" stroke-width="0.8"/>
