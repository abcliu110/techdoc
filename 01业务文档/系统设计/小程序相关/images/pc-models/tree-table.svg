<text class="h" x="350" y="292">Code       Name        Status      Owner       Action</text>
<text class="t" x="350" y="330">001        Store A     Active      Alice       Edit</text>
<text class="t" x="350" y="368">002        Store B     Disabled    Bob         View</text>
<text class="t" x="350" y="406">003        Store C     Active      Chen        Edit</text>
<path class="line" d="M285,285 L330,285"/>
</svg>