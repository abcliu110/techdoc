<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
<defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker></defs>
<style>
  .bg{fill:#f6f8fb}
  .panel{fill:#ffffff;stroke:#d7dde8;stroke-width:2}
  .soft{fill:#f1f5f9;stroke:#d7dde8;stroke-width:1.5}
  .brandSoft{fill:#dbeafe;stroke:#93c5fd;stroke-width:1.5}
  .warn{fill:#fff7ed;stroke:#fdba74;stroke-width:1.5}
  .danger{fill:#fee2e2;stroke:#fca5a5;stroke-width:1.5}
  .success{fill:#dcfce7;stroke:#86efac;stroke-width:1.5}
  .line{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#arrow)}
  .title{font:700 24px Arial, sans-serif;fill:#0f172a}
  .h{font:700 16px Arial, sans-serif;fill:#0f172a}
  .t{font:14px Arial, sans-serif;fill:#334155}
  .s{font:12px Arial, sans-serif;fill:#64748b}
</style>
<rect class="bg" x="0" y="0" width="960" height="540"/>
<text class="title" x="40" y="46">Query + Table Pattern</text>
<rect class="panel" x="55" y="90" width="850" height="75" rx="12"/>
<text class="h" x="80" y="120">Query Conditions</text>
<text class="t" x="80" y="148">Order No | Date Range | Status | Store | Customer | Search | Reset</text>
<rect class="brandSoft" x="55" y="180" width="850" height="58" rx="12"/>
<text class="t" x="80" y="215">Toolbar: New | Batch Approve | Export | Print</text>
<rect class="soft" x="55" y="255" width="850" height="205" rx="12"/>
<text class="h" x="80" y="290">Order No     Date        Customer     Amount     Status     Action</text>
<text class="t" x="80" y="330">SO001        2026-07-03  A Corp       1200       Pending    Review</text>
<text class="t" x="80" y="372">SO002        2026-07-03  B Corp       800        Done       View</text>
<text class="t" x="80" y="414">SO003        2026-07-02  C Corp       530        Failed     Retry</text>
<rect class="panel" x="55" y="475" width="850" height="38" rx="8"/>
<text class="s" x="80" y="500">Selected 3 | Total 128 | Page 1 / 13</text>
</svg>