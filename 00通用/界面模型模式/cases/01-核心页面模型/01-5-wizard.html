<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案例：门店开通向导 - Wizard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; color: #333; font-size: 14px; }
    .wizard-page { max-width: 800px; margin: 0 auto; padding: 24px; }

    /* Header */
    .wizard-header { margin-bottom: 24px; }
    .wizard-header h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .wizard-header p { color: #666; }

    /* Steps */
    .steps { display: flex; justify-content: space-between; margin-bottom: 32px; position: relative; }
    .steps::before { content: ''; position: absolute; top: 16px; left: 40px; right: 40px; height: 2px; background: #f0f0f0; z-index: 0; }
    .step { display: flex; flex-direction: column; align-items: center; z-index: 1; position: relative; }
    .step-number { width: 32px; height: 32px; border-radius: 50%; background: #f0f0f0; color: #999; display: flex; align-items: center; justify-content: center; font-weight: 600; margin-bottom: 8px; }
    .step.active .step-number { background: #1890ff; color: #fff; }
    .step.completed .step-number { background: #52c41a; color: #fff; }
    .step-label { font-size: 13px; color: #999; }
    .step.active .step-label { color: #1890ff; font-weight: 500; }
    .step.completed .step-label { color: #52c41a; }

    /* Form Card */
    .form-card { background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .form-section { margin-bottom: 24px; }
    .form-section:last-child { margin-bottom: 0; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a1a; }

    /* Form Fields */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full-width { grid-column: 1 / -1; }
    .field label { font-size: 13px; color: #666; }
    .field label .required { color: #ff4d4f; margin-right: 2px; }
    .field input, .field select, .field textarea { padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; transition: border-color 0.2s; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: #1890ff; outline: none; box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2); }
    .field-hint { font-size: 12px; color: #999; }
    .field-static { padding: 10px 0; color: #1a1a1a; }

    /* Checkbox Group */
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 16px; }
    .checkbox-group label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; }

    /* Radio Group */
    .radio-group { display: flex; gap: 24px; }
    .radio-group label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .radio-group input[type="radio"] { width: 16px; height: 16px; }

    /* Preview Card */
    .preview-card { background: #fafafa; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .preview-section { margin-bottom: 16px; }
    .preview-section:last-child { margin-bottom: 0; }
    .preview-section h4 { font-size: 14px; color: #1a1a1a; margin-bottom: 8px; }
    .preview-section ul { list-style: none; color: #666; font-size: 13px; }
    .preview-section li { padding: 4px 0; padding-left: 16px; position: relative; }
    .preview-section li::before { content: '•'; position: absolute; left: 0; color: #1890ff; }

    /* Warning Box */
    .warning-box { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 6px; padding: 12px 16px; margin-top: 16px; }
    .warning-box span { color: #ad6800; font-size: 13px; }
    .warning-box::before { content: '⚠️ '; }

    /* Action Bar */
    .action-bar { display: flex; justify-content: space-between; margin-top: 24px; padding-top: 24px; border-top: 1px solid #f0f0f0; }
    .btn { padding: 10px 24px; border-radius: 4px; font-size: 14px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
    .btn-primary { background: #1890ff; color: #fff; border-color: #1890ff; }
    .btn-primary:hover { background: #40a9ff; }
    .btn-default { background: #fff; color: #333; border-color: #d9d9d9; }
    .btn-default:hover { color: #1890ff; border-color: #1890ff; }
    .btn-success { background: #52c41a; color: #fff; border-color: #52c41a; }
    .btn-success:hover { background: #73d13d; }
    .btn-draft { background: #fff; color: #666; border-color: #d9d9d9; }
    .btn-draft:hover { color: #1890ff; border-color: #1890ff; }

    /* Case Badge */
    .case-badge { position: fixed; top: 20px; right: 20px; background: #1890ff; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 12px; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.3); }
    .case-badge::before { content: "案例 "; }

    /* Device List */
    .device-list { background: #fafafa; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
    .device-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .device-item:last-child { border-bottom: none; }
    .device-name { font-weight: 500; }
    .device-code { color: #999; font-size: 12px; }
    .device-remove { color: #ff4d4f; cursor: pointer; font-size: 18px; }
  </style>
</head>
<body>
  <div class="case-badge">Wizard 模型</div>

  <div class="wizard-page">
    <!-- Header -->
    <header class="wizard-header">
      <h1>门店开通向导</h1>
      <p>为新加盟门店完成系统初始化配置</p>
    </header>

    <!-- Steps Indicator -->
    <div class="steps">
      <div class="step completed">
        <div class="step-number">✓</div>
        <span class="step-label">基础信息</span>
      </div>
      <div class="step completed">
        <div class="step-number">✓</div>
        <span class="step-label">业务配置</span>
      </div>
      <div class="step active">
        <div class="step-number">3</div>
        <span class="step-label">硬件配置</span>
      </div>
      <div class="step">
        <div class="step-number">4</div>
        <span class="step-label">预览确认</span>
      </div>
    </div>

    <!-- Form Card -->
    <div class="form-card">
      <!-- Step 3: 硬件配置 -->
      <div class="form-section">
        <h3 class="section-title">🖥️ 收银设备</h3>
        <div class="device-list">
          <div class="device-item">
            <div>
              <div class="device-name">收银机 A</div>
              <div class="device-code">设备编码：IPOS-001</div>
            </div>
            <span class="device-remove">×</span>
          </div>
        </div>
        <div style="display:flex;gap:12px;align-items:center;">
          <select style="flex:1;padding:10px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:14px;">
            <option value="">选择已有设备</option>
            <option value="IPOS-002">收银机 B (IPOS-002)</option>
            <option value="IPOS-003">收银机 C (IPOS-003)</option>
          </select>
          <button class="btn btn-default" style="white-space:nowrap;">+ 新增设备</button>
        </div>
      </div>

      <div class="form-section">
        <h3 class="section-title">🖨️ 打印机配置</h3>
        <div class="checkbox-group">
          <label><input type="checkbox" checked> 前台小票打印机</label>
          <label><input type="checkbox"> 标签打印机</label>
          <label><input type="checkbox" checked> 后厨打印机</label>
        </div>
      </div>

      <div class="form-section">
        <h3 class="section-title">📱 其他设备</h3>
        <div class="checkbox-group">
          <label><input type="checkbox" checked> 启用扫码枪</label>
          <label><input type="checkbox"> 启用电子秤</label>
          <label><input type="checkbox"> 启用会员卡刷卡器</label>
        </div>
      </div>

      <!-- Action Bar -->
      <div class="action-bar">
        <button class="btn btn-default">← 上一步</button>
        <div style="display:flex;gap:12px;">
          <button class="btn btn-draft">💾 保存草稿</button>
          <button class="btn btn-primary">下一步 →</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
