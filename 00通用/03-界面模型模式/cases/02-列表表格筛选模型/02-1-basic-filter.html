<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>案例：零售订单基础筛选</title><link rel="stylesheet" href="../shared/case.css"></head>
<body>
  <a class="skip-link" href="#main">跳到主要内容</a><div class="app-shell">
    <header class="app-bar"><div class="brand"><span class="brand-mark">BF</span>订单查询</div><div class="app-context">人民广场店</div></header>
    <section class="page-header" aria-labelledby="page-title"><div><p class="eyebrow">Basic Filter · 基础筛选</p><h1 id="page-title">查找待发货订单</h1><p class="subtitle">让最高频、可直接表达的条件保持可见，不强迫用户理解查询语法。</p></div><div class="header-meta"><span class="demo-mode" data-kind="interactive">交互案例</span><span class="tag info">默认视图</span></div></section>
    <main id="main" class="page-body" data-demo="interactive"><div class="content-stack">
      <form class="filter-bar" aria-label="基础筛选" onsubmit="return false"><div class="field"><label for="basic-keyword">订单号或会员</label><input id="basic-keyword" type="search" placeholder="订单号 / 手机号"></div><div class="field"><label for="basic-status">状态</label><select id="basic-status"><option>全部状态</option><option selected>待发货</option><option>已发货</option></select></div><div class="field"><label for="basic-date">下单日期</label><input id="basic-date" type="date" value="2026-07-12"></div><div class="field"><label for="basic-store">门店</label><select id="basic-store"><option selected>人民广场店</option><option>淮海路店</option></select></div><div class="actions"><button class="btn primary" type="button" data-action="toast" data-message="已应用 3 个条件，找到 25 笔订单">查询</button><button class="btn" type="reset">重置</button></div></form>
      <div class="chip-row" aria-label="已应用筛选"><span class="chip">状态：待发货<button type="button" data-action="remove-chip" aria-label="移除状态筛选">×</button></span><span class="chip">日期：2026-07-12<button type="button" data-action="remove-chip" aria-label="移除日期筛选">×</button></span><span class="chip">门店：人民广场店<button type="button" data-action="remove-chip" aria-label="移除门店筛选">×</button></span></div>
      <section class="table-shell" aria-labelledby="basic-results"><div class="surface-header"><h2 id="basic-results">查询结果</h2><span class="count">25 笔</span></div><div class="table-scroll responsive-table"><table><thead><tr><th scope="col">订单号</th><th scope="col">会员</th><th scope="col">状态</th><th scope="col" class="numeric">金额</th><th scope="col">下单时间</th></tr></thead><tbody><tr><td data-label="订单号"><a href="#">SO202607120045</a></td><td data-label="会员">张三</td><td data-label="状态"><span class="badge warning">待发货</span></td><td data-label="金额" class="numeric">¥328.50</td><td data-label="下单时间">14:30</td></tr><tr><td data-label="订单号"><a href="#">SO202607120044</a></td><td data-label="会员">李四</td><td data-label="状态"><span class="badge danger">已超时</span></td><td data-label="金额" class="numeric">¥156.00</td><td data-label="下单时间">13:25</td></tr></tbody></table></div></section>
      <div class="notice"><strong>基础筛选边界</strong>可见条件只覆盖高频任务；多字段组合、范围和排除关系进入高级筛选。</div>
    </div></main>
  </div><div class="sr-only" role="status" aria-live="polite" data-live-region></div><div class="toast" role="status" data-toast hidden></div><script src="../shared/case.js"></script>
</body></html>
