<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>案例：零售订单高级筛选</title><link rel="stylesheet" href="../shared/case.css"></head>
<body>
  <a class="skip-link" href="#main">跳到主要内容</a><div class="app-shell">
    <header class="app-bar"><div class="brand"><span class="brand-mark">AF</span>订单查询</div><div class="app-context">跨门店异常排查</div></header>
    <section class="page-header" aria-labelledby="page-title"><div><p class="eyebrow">Advanced Filter · 高级筛选</p><h1 id="page-title">履约风险组合查询</h1><p class="subtitle">用清晰分组表达范围、排除条件和业务事实，查询意图始终可见且可撤销。</p></div><div class="header-meta"><span class="demo-mode" data-kind="interactive">交互案例</span><span class="tag warning">5 个条件</span></div></section>
    <main id="main" class="page-body" data-demo="interactive"><div class="content-stack">
      <section class="surface" aria-labelledby="advanced-title"><div class="surface-header"><h2 id="advanced-title">筛选条件</h2><button class="btn quiet" type="button" data-action="toast" data-message="当前条件已另存为个人视图">另存为视图</button></div><div class="surface-body content-stack">
        <div class="form-grid"><div class="field"><label for="advanced-status">履约状态</label><select id="advanced-status" multiple size="3"><option selected>待发货</option><option selected>履约异常</option><option>已发货</option></select><span class="hint">可多选</span></div><div class="field"><label for="advanced-risk">超时风险</label><select id="advanced-risk"><option>不限</option><option selected>已超时或 30 分钟内到期</option></select></div><div class="field"><label for="advanced-min">实付金额下限</label><input id="advanced-min" type="number" value="100" min="0" step="10"></div><div class="field"><label for="advanced-max">实付金额上限</label><input id="advanced-max" type="number" value="1000" min="0" step="10"></div><div class="field"><label for="advanced-store">门店范围</label><select id="advanced-store"><option selected>华东直营店</option><option>全部门店</option></select></div><div class="field"><label for="advanced-exclude">排除支付状态</label><select id="advanced-exclude"><option selected>已退款</option><option>支付失败</option></select></div></div>
        <div class="actions"><button class="btn primary" type="button" data-action="toast" data-message="高级筛选已应用，找到 8 笔高风险订单">应用筛选</button><button class="btn" type="button" data-action="toast" data-message="筛选条件已清空">清空全部</button></div>
      </div></section>
      <div class="chip-row" aria-label="条件摘要"><span class="chip">状态 ∈ 待发货、履约异常<button type="button" data-action="remove-chip" aria-label="移除状态条件">×</button></span><span class="chip">风险 ≤ 30 分钟<button type="button" data-action="remove-chip" aria-label="移除风险条件">×</button></span><span class="chip">100 ≤ 实付 ≤ 1000<button type="button" data-action="remove-chip" aria-label="移除金额条件">×</button></span><span class="chip">排除：已退款<button type="button" data-action="remove-chip" aria-label="移除排除条件">×</button></span></div>
      <section class="table-shell" aria-labelledby="advanced-results"><div class="surface-header"><h2 id="advanced-results">高风险订单</h2><span class="count">8 笔</span></div><div class="table-scroll responsive-table"><table><thead><tr><th scope="col">订单号</th><th scope="col">门店</th><th scope="col">风险依据</th><th scope="col" class="numeric">实付金额</th><th scope="col">责任人</th></tr></thead><tbody><tr><td data-label="订单号">SO202607120044</td><td data-label="门店">人民广场店</td><td data-label="风险依据"><span class="badge danger">已超时 35 分钟</span></td><td data-label="实付金额" class="numeric">¥156.00</td><td data-label="责任人">李敏</td></tr><tr><td data-label="订单号">SO202607120039</td><td data-label="门店">淮海路店</td><td data-label="风险依据"><span class="badge warning">剩余 18 分钟</span></td><td data-label="实付金额" class="numeric">¥688.00</td><td data-label="责任人">王强</td></tr></tbody></table></div></section>
    </div></main>
  </div><div class="sr-only" role="status" aria-live="polite" data-live-region></div><div class="toast" role="status" data-toast hidden></div><script src="../shared/case.js"></script>
</body></html>
