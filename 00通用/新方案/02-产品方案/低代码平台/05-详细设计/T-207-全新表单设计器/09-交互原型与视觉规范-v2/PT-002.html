<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>T-207 表单设计器 V2 - PT-002 空画布与初始态</title>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.js"></script>
  <style>
    :root{--bg:#e8edf3;--panel:#fff;--sub:#f7f9fb;--muted:#667085;--text:#1f2937;--text2:#475467;--line:#d7dee8;--strong:#b6c0cd;--rail:#263241;--accent:#2468c9;--soft:#edf4ff;--ok:#19733f;--radius:4px;--shadow:0 4px 16px rgba(30,41,59,.12)}
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font:13px "Microsoft YaHei UI","Segoe UI",sans-serif;letter-spacing:0}button,input{font:inherit;letter-spacing:0}button{cursor:pointer}[hidden]{display:none!important}
    button:focus-visible,input:focus-visible,[tabindex]:focus-visible{outline:2px solid #4c8fe8;outline-offset:1px}
    .app{height:100vh;min-width:1120px;display:grid;grid-template-rows:48px minmax(0,1fr) 30px;background:var(--bg)}
    .topbar{display:grid;grid-template-columns:310px minmax(360px,1fr) auto;align-items:center;gap:12px;padding:0 10px;border-bottom:1px solid var(--strong);background:#fff}
    .brand,.tools,.top-actions,.status-left,.status-right{min-width:0;display:flex;align-items:center;gap:6px}.brand{font-weight:700}.brand-mark{width:26px;height:26px;display:grid;place-items:center;border-radius:4px;background:var(--rail);color:#fff}.brand-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.chip{height:22px;display:inline-flex;align-items:center;padding:0 7px;border:1px solid var(--line);border-radius:999px;background:var(--sub);color:var(--text2);font-size:12px;white-space:nowrap}.top-actions{justify-content:flex-end}
    .icon-btn,.btn{height:30px;border:1px solid transparent;border-radius:4px;background:transparent;color:var(--text2);display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}.icon-btn{width:32px;padding:0}.btn{padding:0 10px}.icon-btn:hover,.btn:hover{background:#f0f3f7;color:var(--text)}.btn.primary{border-color:#1f61bc;background:var(--accent);color:#fff}.btn.primary:hover{background:#1e5db3}.btn svg,.icon-btn svg,.nav-btn svg,.empty-icon svg{width:15px;height:15px;stroke-width:1.8}
    .workspace{min-width:0;min-height:0;display:grid;grid-template-columns:52px 252px minmax(0,1fr) 286px}
    .rail{min-height:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 4px;background:var(--rail);border-right:1px solid #18212c}.nav-btn{width:44px;height:46px;border:0;border-radius:4px;background:transparent;color:#c9d3df;display:grid;grid-template-rows:24px 12px;place-items:center;padding:4px 2px}.nav-btn:hover{background:#344154;color:#fff}.nav-btn.active{background:#3a4b61;color:#fff;box-shadow:inset 3px 0 0 #71a8ff}.nav-btn span{font-size:10px;font-weight:600;white-space:nowrap}.nav-spacer{flex:1}
    .left,.right{min-width:0;min-height:0;display:grid;grid-template-rows:38px minmax(0,1fr);background:#fff}.left{border-right:1px solid var(--line)}.right{border-left:1px solid var(--line)}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 10px;border-bottom:1px solid var(--line);background:var(--sub);font-weight:700}.panel-body{min-height:0;overflow:auto;padding:10px}.search{position:relative;margin-bottom:10px}.search input{width:100%;height:28px;padding:0 8px 0 29px;border:1px solid var(--line);border-radius:4px;color:var(--text)}.search svg{position:absolute;left:8px;top:7px;width:14px;height:14px;color:var(--muted)}
    .section-title{height:30px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e8edf3;color:var(--text2);font-weight:700}.component-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;padding-top:7px}.component{height:58px;min-width:0;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--text2);display:grid;grid-template-columns:28px minmax(0,1fr);align-items:center;gap:7px;padding:7px;text-align:left}.component:hover{border-color:#8db3ee;background:var(--soft);color:var(--accent)}.component .cicon{width:28px;height:28px;display:grid;place-items:center;border:1px solid var(--line);border-radius:4px;background:#f9fbfd}.component strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}.component small{display:block;margin-top:3px;color:var(--muted);font-size:10px;white-space:nowrap}
    .center{min-width:0;min-height:0;display:grid;grid-template-rows:34px minmax(0,1fr);background:#e9eef4}.canvas-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 9px;border-bottom:1px solid var(--line);background:#fbfcfe}.crumb{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:12px}.zoom{display:flex;align-items:center;gap:4px}.zoom-value{min-width:42px;text-align:center;color:var(--text2);font-size:12px}
    .viewport{min-width:0;min-height:0;overflow:auto;padding:18px;background:linear-gradient(#dfe6ee 1px,transparent 1px),linear-gradient(90deg,#dfe6ee 1px,transparent 1px),#edf1f5;background-size:24px 24px}.artboard{width:min(900px,100%);min-width:580px;min-height:600px;margin:0 auto;border:1px solid #bdc7d3;background:#fff;box-shadow:var(--shadow)}.page-head{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--line);background:#fbfcfe}.page-head strong{font-size:16px}.page-head span{color:var(--muted);font-size:12px}
    .design-area{min-height:550px;padding:14px}.dropzone{height:100%;min-height:515px;border:1px dashed #aeb9c7;border-radius:4px;background:#fcfdfe;display:grid;place-items:center;padding:24px}.empty{width:min(430px,100%);text-align:center}.empty-icon{width:48px;height:48px;margin:0 auto 14px;display:grid;place-items:center;border:1px solid #b8c7da;border-radius:4px;background:#eef4fb;color:#40668f}.empty-icon svg{width:23px;height:23px}.empty h1{margin:0 0 7px;font-size:17px}.empty p{margin:0 auto 16px;max-width:380px;color:var(--muted);line-height:1.7}.empty-actions{display:flex;align-items:center;justify-content:center;gap:7px}.hint{margin-top:16px;color:#8491a3;font-size:11px}
    .field-card{width:100%;min-height:92px;align-self:start;border:1px solid #3273d1;border-radius:4px;background:#fff;box-shadow:0 0 0 2px rgba(50,115,209,.14);padding:12px;position:relative}.field-card:before{content:"已选中";position:absolute;right:8px;top:8px;color:var(--accent);font-size:11px}.field-label{margin-bottom:7px;color:var(--text2)}.required{color:#b42318}.field-control{height:32px;display:flex;align-items:center;padding:0 9px;border:1px solid #cfd8e3;border-radius:3px;background:#fafbfc;color:#98a2b3}.field-note{margin-top:12px;padding:10px;border:1px dashed var(--line);background:var(--sub);color:var(--muted);text-align:center}
    .right-body{min-height:0;overflow:auto}.selection{padding:10px;border-bottom:1px solid var(--line)}.selection strong{display:block}.selection span{display:block;margin-top:3px;color:var(--muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tabs{height:34px;display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--line)}.tab{border:0;border-right:1px solid var(--line);background:#fbfcfe;color:var(--muted)}.tab.active{background:#fff;color:var(--accent);font-weight:700;box-shadow:inset 0 -2px 0 var(--accent)}.props{padding:7px 10px}.prop{min-height:34px;display:grid;grid-template-columns:78px minmax(0,1fr);align-items:center;gap:8px;border-bottom:1px solid #eef2f6}.prop label{color:var(--muted)}.prop span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.empty-props{padding:42px 18px;text-align:center;color:var(--muted);line-height:1.7}.empty-props strong{display:block;margin-bottom:5px;color:var(--text2)}
    .status{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:10px;padding:0 10px;border-top:1px solid var(--strong);background:#fff;color:var(--text2);font-size:12px}.status-left span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.status-right{white-space:nowrap}.dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}.sep{width:1px;height:14px;background:var(--line)}
    @media(max-width:1500px){.workspace{grid-template-columns:52px 236px minmax(0,1fr) 270px}.viewport{padding:14px}.topbar{grid-template-columns:285px minmax(330px,1fr) auto}.component-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app" data-testid="pt002-v2-root" data-prototype="PT-002" data-state="empty" data-breakpoint="desktop-1440">
    <header class="topbar" data-testid="workbench-region-top">
      <div class="brand"><span class="brand-mark">T</span><span class="brand-name">新建业务表单</span><span class="chip">未保存</span></div>
      <div class="tools" aria-label="设计命令"><button class="icon-btn" title="撤销" aria-label="撤销" disabled><i data-lucide="undo-2"></i></button><button class="icon-btn" title="重做" aria-label="重做" disabled><i data-lucide="redo-2"></i></button><span class="sep"></span><button class="btn"><i data-lucide="save"></i>保存草稿</button><button class="btn"><i data-lucide="play"></i>预览</button></div>
      <div class="top-actions"><span class="chip">自动保存已开启</span><button class="btn primary"><i data-lucide="rocket"></i>发布</button></div>
    </header>
    <main class="workspace">
      <nav class="rail" aria-label="设计器活动栏"><button class="nav-btn active" aria-label="组件库"><i data-lucide="blocks"></i><span>组件</span></button><button class="nav-btn" aria-label="字段"><i data-lucide="database"></i><span>字段</span></button><button class="nav-btn" aria-label="页面大纲"><i data-lucide="list-tree"></i><span>大纲</span></button><div class="nav-spacer"></div><button class="nav-btn" aria-label="设置"><i data-lucide="settings"></i><span>设置</span></button></nav>
      <aside class="left" data-testid="pt002-component-panel"><div class="panel-head"><span>组件库</span><span class="chip">86</span></div><div class="panel-body"><div class="search"><i data-lucide="search"></i><input data-testid="pt002-component-search" placeholder="搜索组件" /></div><div class="section-title"><span>常用字段</span><span>拖入画布</span></div><div class="component-grid"><button class="component" data-testid="pt002-component-text"><span class="cicon">Aa</span><span><strong>单行文本</strong><small>TextInput</small></span></button><button class="component"><span class="cicon">#</span><span><strong>数字</strong><small>NumberInput</small></span></button><button class="component"><span class="cicon">▾</span><span><strong>下拉选择</strong><small>Select</small></span></button><button class="component"><span class="cicon">◷</span><span><strong>日期时间</strong><small>DateTime</small></span></button></div><div class="section-title" style="margin-top:12px"><span>布局容器</span><span>4</span></div><div class="component-grid"><button class="component"><span class="cicon">▦</span><span><strong>栅格</strong><small>Grid</small></span></button><button class="component"><span class="cicon">□</span><span><strong>分组</strong><small>Section</small></span></button></div></div></aside>
      <section class="center"><div class="canvas-bar"><div class="crumb" data-testid="pt002-breadcrumb">页面 / 主表单 / 空画布</div><div class="zoom"><button class="icon-btn" aria-label="缩小"><i data-lucide="minus"></i></button><span class="zoom-value">100%</span><button class="icon-btn" aria-label="放大"><i data-lucide="plus"></i></button><button class="icon-btn" aria-label="适应画布"><i data-lucide="scan"></i></button></div></div><div class="viewport" data-testid="pt002-canvas-viewport"><article class="artboard"><header class="page-head"><strong>未命名表单</strong><span>桌面端 · 12 列网格</span></header><div class="design-area"><div class="dropzone" data-testid="pt002-empty-dropzone"><div class="empty" data-testid="pt002-empty-state"><div class="empty-icon"><i data-lucide="layout-template"></i></div><h1>从第一个字段开始</h1><p>从左侧拖入组件，或使用快捷操作创建一个单行文本字段。画布会自动建立首个内容区。</p><div class="empty-actions"><button class="btn primary" data-testid="pt002-add-first-field"><i data-lucide="plus"></i>添加单行文本</button><button class="btn" data-testid="pt002-open-template"><i data-lucide="library"></i>选择模板</button></div><div class="hint">也可以将组件拖放到此区域</div></div><div class="field-card" data-testid="pt002-first-field" hidden tabindex="0"><div class="field-label"><span class="required">*</span> 文本字段</div><div class="field-control">请输入内容</div><div class="field-note">继续从左侧添加组件</div></div></div></div></article></div></section>
      <aside class="right" data-testid="pt002-inspector"><div class="panel-head"><span>属性</span><span class="chip" data-testid="pt002-inspector-state">等待选择</span></div><div class="right-body"><div class="selection"><strong data-testid="pt002-selected-name">页面</strong><span data-testid="pt002-selected-path">PageRoot</span></div><div class="tabs"><button class="tab active">业务</button><button class="tab">布局</button><button class="tab">事件</button></div><div class="empty-props" data-testid="pt002-empty-properties"><strong>尚未选择组件</strong>添加或选择画布中的字段后，可在此配置标题、数据绑定与校验规则。</div><div class="props" data-testid="pt002-field-properties" hidden><div class="prop"><label>标题</label><span>文本字段</span></div><div class="prop"><label>字段编码</label><span>textField</span></div><div class="prop"><label>控件类型</label><span>单行文本</span></div><div class="prop"><label>必填</label><span>是</span></div><div class="prop"><label>列跨度</label><span>12 / 12</span></div></div></div></aside>
    </main>
    <footer class="status"><div class="status-left"><span class="dot"></span><strong data-testid="pt002-status-title">画布就绪</strong><span data-testid="pt002-status-message">添加第一个组件以开始设计</span></div><div class="status-right"><span>组件 86</span><span class="sep"></span><span>Schema 0 KB</span><span class="sep"></span><span data-testid="pt002-viewport-chip">1440 工作区</span></div></footer>
  </div>
  <script>
    (function(){
      var root=document.querySelector('[data-testid="pt002-v2-root"]');
      var add=document.querySelector('[data-testid="pt002-add-first-field"]');
      function createFirstField(){
        document.querySelector('[data-testid="pt002-empty-state"]').hidden=true;
        document.querySelector('[data-testid="pt002-first-field"]').hidden=false;
        document.querySelector('[data-testid="pt002-empty-properties"]').hidden=true;
        document.querySelector('[data-testid="pt002-field-properties"]').hidden=false;
        document.querySelector('[data-testid="pt002-selected-name"]').textContent='文本字段';
        document.querySelector('[data-testid="pt002-selected-path"]').textContent='PageRoot.MainSection.textField';
        document.querySelector('[data-testid="pt002-inspector-state"]').textContent='已同步';
        document.querySelector('[data-testid="pt002-breadcrumb"]').textContent='页面 / 主表单 / 文本字段';
        document.querySelector('[data-testid="pt002-status-title"]').textContent='字段已添加';
        document.querySelector('[data-testid="pt002-status-message"]').textContent='文本字段已选中，属性面板已同步';
        root.setAttribute('data-state','first-field-added');root.setAttribute('data-last-action','add-first-field');
      }
      add.addEventListener('click',createFirstField);
      document.querySelector('[data-testid="pt002-component-text"]').addEventListener('click',createFirstField);
      document.querySelector('[data-testid="pt002-open-template"]').addEventListener('click',function(){document.querySelector('[data-testid="pt002-status-message"]').textContent='模板选择器已准备打开';root.setAttribute('data-last-action','open-template');});
      function viewport(){var w=window.innerWidth;root.setAttribute('data-viewport-width',String(w));root.setAttribute('data-breakpoint',w>=1360?'desktop-1440':'desktop-compact');document.querySelector('[data-testid="pt002-viewport-chip"]').textContent=w>=1360?'1440 工作区':'紧凑工作区'}
      window.addEventListener('resize',viewport);viewport();if(window.lucide)window.lucide.createIcons();
    })();
  </script>
</body>
</html>
