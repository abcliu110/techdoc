<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PT-019 组件库默认态</title>
  <style>
    :root {
      --bg: #eef2f6;
      --panel: #ffffff;
      --panel-soft: #f7f9fc;
      --text: #1f2937;
      --muted: #667085;
      --border: #d7dee8;
      --primary: #2468c9;
      --success: #19733f;
      --danger: #c73535;
      --shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-width: 1440px;
      min-height: 900px;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.4 "Microsoft YaHei UI", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input {
      font: inherit;
    }

    .app {
      width: 1440px;
      height: 900px;
      display: grid;
      grid-template-columns: 48px 248px 1fr 300px;
      grid-template-rows: 48px 1fr;
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand {
      font-size: 15px;
      font-weight: 600;
    }

    .meta {
      color: var(--muted);
    }

    .icon-rail {
      background: #f6f8fb;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
    }

    .rail-btn,
    .chip,
    .toolbar-btn,
    .tab,
    .item-action,
    .ghost-btn,
    .primary-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.18s ease, background-color 0.18s ease, color 0.18s ease;
    }

    .rail-btn {
      width: 32px;
      height: 32px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 12px;
    }

    .rail-btn.active,
    .chip.active,
    .tab.active,
    .toolbar-btn.active {
      border-color: var(--primary);
      color: var(--primary);
      background: #edf4ff;
    }

    .library-panel,
    .canvas-panel,
    .props-panel {
      padding: 14px;
    }

    .library-panel {
      border-right: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: var(--shadow);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel-soft);
    }

    .search-box input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 600;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      min-width: 72px;
      padding: 6px 10px;
      white-space: nowrap;
    }

    .component-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .component-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fbfcfe;
    }

    .component-item strong {
      display: block;
      font-size: 13px;
      margin-bottom: 3px;
    }

    .component-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .item-action {
      align-self: start;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .item-action[disabled] {
      color: #98a2b3;
      background: #f3f5f8;
      cursor: not-allowed;
    }

    .canvas-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f3f6fa;
    }

    .toolbar {
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 12px;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-btn {
      padding: 6px 10px;
      white-space: nowrap;
    }

    .canvas-stage {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #f8fafc;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-shell {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .form-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .form-title {
      font-size: 16px;
      font-weight: 600;
    }

    .status-badge {
      padding: 4px 8px;
      border-radius: 4px;
      background: #edf4ff;
      color: var(--primary);
      font-size: 12px;
      white-space: nowrap;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
    }

    .field-box {
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      background: #fff;
    }

    .field-box.placeholder {
      color: #98a2b3;
    }

    .hint-bar {
      margin-top: 14px;
      padding: 10px 12px;
      border: 1px dashed #bfd2f2;
      border-radius: 4px;
      color: var(--muted);
      background: #f7fbff;
    }

    .props-panel {
      border-left: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tabs {
      display: flex;
      gap: 8px;
    }

    .tab {
      flex: 1;
      padding: 8px 0;
      text-align: center;
      white-space: nowrap;
    }

    .prop-section {
      padding: 12px;
    }

    .prop-list {
      display: grid;
      gap: 10px;
    }

    .prop-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
    }

    .prop-row strong {
      color: var(--text);
      font-weight: 500;
    }

    .mini-switch {
      width: 34px;
      height: 20px;
      border-radius: 10px;
      background: #dbe3ee;
      position: relative;
      flex: 0 0 auto;
    }

    .mini-switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.16);
    }

    .footer-note {
      margin-top: auto;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel-soft);
      color: var(--muted);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .ghost-btn,
    .primary-btn {
      height: 32px;
      padding: 0 12px;
      white-space: nowrap;
    }

    .primary-btn {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="app" data-prototype="PT-019" data-state="basic" data-testid="prototype-root" id="prototypeRoot">
    <header class="topbar" data-testid="topbar">
      <div class="topbar-left">
        <div class="brand" data-testid="brand">全新表单设计器</div>
        <div class="meta" data-testid="scene-label">场景：组件库默认态</div>
      </div>
      <div class="topbar-right">
        <button class="ghost-btn" type="button" data-testid="preview-btn">预览</button>
        <button class="primary-btn" type="button" data-testid="publish-btn">发布</button>
      </div>
    </header>

    <aside class="icon-rail" data-testid="icon-rail">
      <button class="rail-btn active" type="button" title="组件库" data-testid="rail-library">组</button>
      <button class="rail-btn" type="button" title="页面结构" data-testid="rail-structure">层</button>
      <button class="rail-btn" type="button" title="数据源" data-testid="rail-data">数</button>
      <button class="rail-btn" type="button" title="校验规则" data-testid="rail-rule">规</button>
    </aside>

    <section class="library-panel" data-testid="library-panel">
      <div class="section-title">
        <span>组件库</span>
        <span class="meta" data-testid="library-count">16 个常用组件</span>
      </div>
      <div class="search-box" data-testid="search-box">
        <span>⌕</span>
        <input type="text" value="" placeholder="搜索字段、布局、按钮" aria-label="搜索组件">
      </div>
      <div class="chips" data-testid="group-switcher">
        <button class="chip active" type="button" data-group="basic" data-testid="chip-basic">基础字段</button>
        <button class="chip" type="button" data-group="layout" data-testid="chip-layout">布局容器</button>
        <button class="chip" type="button" data-group="advanced">高级能力</button>
      </div>
      <div class="component-list" data-testid="component-list" id="componentList"></div>
    </section>

    <main class="canvas-panel" data-testid="canvas-panel">
      <div class="panel-card toolbar" data-testid="canvas-toolbar">
        <div class="toolbar-group">
          <button class="toolbar-btn active" type="button" data-testid="toolbar-select">选择</button>
          <button class="toolbar-btn" type="button" data-testid="toolbar-guideline">吸附</button>
          <button class="toolbar-btn" type="button" data-testid="toolbar-grid">栅格</button>
        </div>
        <div class="toolbar-group">
          <span class="meta" data-testid="toolbar-status">默认展示基础字段，未插入任何组件</span>
        </div>
      </div>

      <div class="canvas-stage" data-testid="canvas-stage">
        <div class="form-shell" data-testid="form-shell">
          <div class="form-head">
            <div class="form-title" data-testid="form-title">客户信息表单</div>
            <div class="status-badge" id="stateBadge" data-testid="state-badge">基础字段</div>
          </div>
          <div class="field-grid" data-testid="field-grid">
            <div class="field">
              <label>客户名称</label>
              <div class="field-box">单行输入框</div>
            </div>
            <div class="field">
              <label>客户编号</label>
              <div class="field-box">自动编码</div>
            </div>
            <div class="field">
              <label>联系人</label>
              <div class="field-box">单行输入框</div>
            </div>
            <div class="field">
              <label>联系电话</label>
              <div class="field-box">手机号组件</div>
            </div>
            <div class="field full">
              <label>备注</label>
              <div class="field-box placeholder">当前为组件库默认态，画布中未发生拖拽插入</div>
            </div>
          </div>
          <div class="hint-bar" id="interactionHint" data-testid="interaction-hint">
            点击左侧组件分组，仅切换默认展示列表与右侧说明，不影响当前画布结构。
          </div>
        </div>
      </div>
    </main>

    <aside class="props-panel" data-testid="props-panel">
      <div class="tabs" data-testid="props-tabs">
        <button class="tab active" type="button" data-testid="tab-overview">概览</button>
        <button class="tab" type="button" data-testid="tab-rule">规则</button>
      </div>
      <div class="panel-card prop-section" data-testid="prop-overview">
        <div class="section-title">
          <span>默认态说明</span>
          <span class="meta" data-testid="prop-state">basic</span>
        </div>
        <div class="prop-list">
          <div class="prop-row" data-testid="prop-selected-group">
            <span>当前分组</span>
            <strong id="selectedGroupText">基础字段</strong>
          </div>
          <div class="prop-row">
            <span>拖拽启用</span>
            <div class="mini-switch" aria-hidden="true"></div>
          </div>
          <div class="prop-row">
            <span>插槽预检</span>
            <strong>空闲</strong>
          </div>
          <div class="prop-row">
            <span>资源来源</span>
            <strong>平台内置</strong>
          </div>
        </div>
        <div class="btn-row">
          <button class="ghost-btn" type="button" data-testid="reset-btn">恢复默认</button>
          <button class="ghost-btn" type="button" disabled title="默认态下暂无可撤销操作" data-testid="undo-btn">撤销</button>
        </div>
      </div>
      <div class="footer-note" data-testid="footer-note">
        默认态重点是“看得到、可切换、未入画布”。组件详情与拖拽反馈留给后续场景。
      </div>
    </aside>
  </div>

  <script>
    (function () {
      var root = document.getElementById("prototypeRoot");
      var componentList = document.getElementById("componentList");
      var stateBadge = document.getElementById("stateBadge");
      var selectedGroupText = document.getElementById("selectedGroupText");
      var interactionHint = document.getElementById("interactionHint");
      var propState = document.querySelector('[data-testid="prop-state"]');
      var toolbarStatus = document.querySelector('[data-testid="toolbar-status"]');
      var groupButtons = Array.prototype.slice.call(document.querySelectorAll("[data-group]"));

      var groups = {
        basic: {
          label: "基础字段",
          hint: "基础字段用于承载默认录入能力，适合首屏直接拖入。",
          status: "默认展示基础字段，适合快速搭建主表单。",
          items: [
            { name: "单行输入框", desc: "文本、编号、名称录入", action: "加入" },
            { name: "多行文本", desc: "备注、描述信息", action: "加入" },
            { name: "数字输入", desc: "数量、金额、排序号", action: "加入" },
            { name: "日期选择", desc: "单日期、范围日期", action: "加入" },
            { name: "单选框组", desc: "少量互斥选项", action: "加入" },
            { name: "附件上传", desc: "图片、文档与凭证", action: "敬请期待", disabled: true }
          ]
        },
        layout: {
          label: "布局容器",
          hint: "布局容器默认只做结构编排，帮助设计器建立清晰层级。",
          status: "当前查看布局容器，画布仍保持默认表单骨架。",
          items: [
            { name: "两列栅格", desc: "左右并排字段容器", action: "加入" },
            { name: "分组区块", desc: "标题 + 内容组合", action: "加入" },
            { name: "标签页", desc: "长表单分段组织", action: "加入" },
            { name: "折叠面板", desc: "收起次要区域", action: "加入" },
            { name: "步骤条", desc: "多步骤向导容器", action: "加入" },
            { name: "子表格", desc: "明细行录入布局", action: "加入" }
          ]
        },
        advanced: {
          label: "高级能力",
          hint: "高级能力依赖后端配置，默认态只展示资源可用性，不直接落入画布。",
          status: "当前查看高级能力，可预览可用项但不改变表单结构。",
          items: [
            { name: "关联记录", desc: "选择其他对象数据", action: "加入" },
            { name: "人员组织", desc: "选择人员、部门、角色", action: "加入" },
            { name: "公式字段", desc: "根据其他字段自动计算", action: "加入" },
            { name: "定位组件", desc: "采集地图与坐标", action: "加入" },
            { name: "审批意见", desc: "流程节点专属字段", action: "敬请期待", disabled: true },
            { name: "脚本扩展", desc: "自定义运行逻辑", action: "敬请期待", disabled: true }
          ]
        }
      };

      function renderGroup(groupKey) {
        var group = groups[groupKey];
        root.setAttribute("data-state", groupKey);
        stateBadge.textContent = group.label;
        selectedGroupText.textContent = group.label;
        interactionHint.textContent = group.hint;
        propState.textContent = groupKey;
        toolbarStatus.textContent = group.status;

        componentList.innerHTML = group.items.map(function (item) {
          return [
            '<div class="component-item">',
            "<div>",
            "<strong>" + item.name + "</strong>",
            "<span>" + item.desc + "</span>",
            "</div>",
            '<button class="item-action" type="button"' + (item.disabled ? " disabled" : "") + ">" + item.action + "</button>",
            "</div>"
          ].join("");
        }).join("");

        groupButtons.forEach(function (button) {
          button.classList.toggle("active", button.getAttribute("data-group") === groupKey);
        });
      }

      groupButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          renderGroup(button.getAttribute("data-group"));
        });
      });

      document.querySelector('[data-testid="reset-btn"]').addEventListener("click", function () {
        renderGroup("basic");
      });

      renderGroup("basic");
    }());
  </script>
</body>
</html>
