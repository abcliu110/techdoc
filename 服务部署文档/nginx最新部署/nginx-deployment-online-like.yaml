---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-conf-files
  namespace: nms4cloud
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-html-files
  namespace: nms4cloud
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: nms4cloud
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: 192.168.1.119:30020/library/nginx:1.25.3
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: nginx-conf-files
              mountPath: /etc/nginx/conf.d
            - name: nginx-html-files
              mountPath: /usr/share/nginx/html
      volumes:
        - name: nginx-conf-files
          persistentVolumeClaim:
            claimName: nginx-conf-files
        - name: nginx-html-files
          persistentVolumeClaim:
            claimName: nginx-html-files
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: nms4cloud
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
