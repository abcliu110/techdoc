apiVersion: v1
kind: Namespace
metadata:
  name: nms4cloud
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nms4cloud-coupon-mock
  namespace: nms4cloud
  labels:
    app: nms4cloud-coupon-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nms4cloud-coupon-mock
  template:
    metadata:
      labels:
        app: nms4cloud-coupon-mock
    spec:
      containers:
        - name: nms4cloud-coupon-mock
          image: 192.168.1.119:30020/library/nms4cloud-coupon-mock:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 18080
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
            - name: COUPON_MOCK_UPSTREAM_WECHAT_URL
              value: "http://nms4cloud-wechat.nms4cloud.svc.cluster.local:8080"
          startupProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nms4cloud-coupon-mock
  namespace: nms4cloud
spec:
  type: NodePort
  selector:
    app: nms4cloud-coupon-mock
  ports:
    - name: http
      port: 18080
      targetPort: 18080
      nodePort: 31880
      protocol: TCP
