            - StripPrefix=2  
            
        - id: nms4cloud-mall 
          uri: lb://nms4cloud-mall 
          order: 3 
          predicates: 
            - Path=/*api/mall/**
          filters: 
            - StripPrefix=2  

        - id: nms4cloud-netty 
          uri: lb://nms4cloud-netty 
