<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="900" viewBox="0 0 1380 900">
  <defs>
    <style>
      .title { font: 700 28px "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .group-title { font: 700 18px "Microsoft YaHei", Arial, sans-serif; fill: #263247; }
      .text { font: 14px "Microsoft YaHei", Arial, sans-serif; fill: #263247; }
      .small { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #536071; }
      .group { fill: #f7f9fc; stroke: #d7deea; stroke-width: 1.6; rx: 10; }
      .entry { fill: #ffffff; stroke: #c8d1df; stroke-width: 1.2; rx: 7; }
      .nodeport { fill: #fff7ea; stroke: #e5ad55; }
      .clusterip { fill: #eef5ff; stroke: #7baaf7; }
      .biz { fill: #eefaf4; stroke: #6cc98b; }
    </style>
  </defs>
  <rect width="1380" height="900" fill="#ffffff"/>
  <text x="40" y="48" class="title">K8s Service 清单与端口图</text>
  <text x="40" y="78" class="small">根据腾讯云 TKE“服务与路由”截图整理，部分端口因截图省略以“...”表示</text>

  <rect x="40" y="115" width="405" height="705" class="group biz"/>
  <text x="70" y="150" class="group-title">业务服务 / 入口服务</text>
  <rect x="70" y="180" width="345" height="58" class="entry clusterip"/>
  <text x="92" y="205" class="text">a00-nms4cloud-crm</text><text x="92" y="226" class="small">ClusterIP / TCP:80</text>
  <rect x="70" y="255" width="345" height="58" class="entry clusterip"/>
  <text x="92" y="280" class="text">a00-nms4cloud-mall</text><text x="92" y="301" class="small">ClusterIP / TCP:80</text>
  <rect x="70" y="330" width="345" height="58" class="entry clusterip"/>
  <text x="92" y="355" class="text">a00-nms4cloud-mq</text><text x="92" y="376" class="small">ClusterIP / TCP:80</text>
  <rect x="70" y="405" width="345" height="58" class="entry clusterip"/>
  <text x="92" y="430" class="text">a00-nms4cloud-order</text><text x="92" y="451" class="small">ClusterIP / TCP:80</text>
  <rect x="70" y="495" width="345" height="78" class="entry nodeport"/>
  <text x="92" y="520" class="text">a00-nms4cloud-netty</text>
  <text x="92" y="542" class="small">NodePort / TCP:80:30011</text>
  <text x="92" y="563" class="small">NodePort / TCP:9999:30012</text>
  <rect x="70" y="605" width="345" height="58" class="entry nodeport"/>
  <text x="92" y="630" class="text">nginx</text><text x="92" y="651" class="small">NodePort / TCP:80:30008</text>

  <rect x="485" y="115" width="405" height="705" class="group"/>
  <text x="515" y="150" class="group-title">治理 / 运维入口</text>
  <rect x="515" y="180" width="345" height="78" class="entry nodeport"/>
  <text x="537" y="205" class="text">nacos</text><text x="537" y="227" class="small">NodePort / TCP:8848:30002</text><text x="537" y="248" class="small">NodePort / TCP:9848:30003</text>
  <rect x="515" y="280" width="345" height="58" class="entry clusterip"/>
  <text x="537" y="305" class="text">sentinel</text><text x="537" y="326" class="small">ClusterIP / TCP:8858</text>
  <rect x="515" y="360" width="345" height="70" class="entry clusterip"/>
  <text x="537" y="385" class="text">skywalking</text><text x="537" y="407" class="small">ClusterIP / TCP:12800</text><text x="537" y="423" class="small">ClusterIP / TCP:11800</text>
  <rect x="515" y="452" width="345" height="58" class="entry nodeport"/>
  <text x="537" y="477" class="text">skywalking-ui</text><text x="537" y="498" class="small">NodePort / TCP:8080:30009</text>
  <rect x="515" y="532" width="345" height="58" class="entry nodeport"/>
  <text x="537" y="557" class="text">xxl-job</text><text x="537" y="578" class="small">NodePort / TCP:8080:30010</text>
  <rect x="515" y="612" width="345" height="58" class="entry nodeport"/>
  <text x="537" y="637" class="text">rocketmq-ui</text><text x="537" y="658" class="small">NodePort / TCP:8080:30001</text>

  <rect x="930" y="115" width="405" height="705" class="group"/>
  <text x="960" y="150" class="group-title">中间件 / 数据与流处理</text>
  <rect x="960" y="180" width="345" height="70" class="entry clusterip"/>
  <text x="982" y="205" class="text">rocketmq</text><text x="982" y="227" class="small">ClusterIP / TCP:10909</text><text x="982" y="243" class="small">ClusterIP / TCP:10911 / ...</text>
  <rect x="960" y="272" width="345" height="70" class="entry clusterip"/>
  <text x="982" y="297" class="text">elasticsearch</text><text x="982" y="319" class="small">ClusterIP / TCP:9200</text><text x="982" y="335" class="small">ClusterIP / TCP:9300</text>
  <rect x="960" y="364" width="345" height="78" class="entry nodeport"/>
  <text x="982" y="389" class="text">emqx54</text><text x="982" y="411" class="small">NodePort / TCP:1883:30983</text><text x="982" y="432" class="small">NodePort / TCP:8083:30984 / ...</text>
  <rect x="960" y="464" width="345" height="78" class="entry nodeport"/>
  <text x="982" y="489" class="text">flink-jobmanager</text><text x="982" y="511" class="small">NodePort / TCP:6123:31001</text><text x="982" y="532" class="small">NodePort / TCP:6124:31002 / ...</text>
  <rect x="960" y="564" width="345" height="70" class="entry clusterip"/>
  <text x="982" y="589" class="text">flink-taskmanager</text><text x="982" y="611" class="small">ClusterIP / TCP:6121</text><text x="982" y="627" class="small">ClusterIP / TCP:6122 / ...</text>
  <rect x="960" y="656" width="345" height="58" class="entry clusterip"/>
  <text x="982" y="681" class="text">zookeeper</text><text x="982" y="702" class="small">ClusterIP / TCP:2181</text>
</svg>
