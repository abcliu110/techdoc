<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="820" viewBox="0 0 1380 820">
  <defs>
    <style>
      .title { font: 700 28px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
      .group-title { font: 700 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #263247; }
      .text { font: 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #263247; }
      .small { font: 13px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #536071; }
      .box { fill: #ffffff; stroke: #b8c3d6; stroke-width: 1.4; rx: 8; }
      .group { fill: #f7f9fc; stroke: #d7deea; stroke-width: 1.6; rx: 10; }
      .client { fill: #eef5ff; stroke: #8bb6ff; }
      .dns { fill: #f4f0ff; stroke: #a997e5; }
      .clb { fill: #eefaf4; stroke: #6cc98b; }
      .node { fill: #fff7ea; stroke: #e5ad55; }
      .service { fill: #ffffff; stroke: #b8c3d6; }
      .https { fill: none; stroke: #2f6fed; stroke-width: 2.2; marker-end: url(#arrowBlue); }
      .tcp { fill: none; stroke: #d07a00; stroke-width: 2.2; marker-end: url(#arrowOrange); }
      .line { fill: none; stroke: #536071; stroke-width: 1.6; marker-end: url(#arrow); }
      .badge443 { fill: #e9f1ff; stroke: #9abcf5; rx: 5; }
      .badge9080 { fill: #fff1df; stroke: #e3aa60; rx: 5; }
      .badge-text { font: 700 12px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #263247; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#536071"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f6fed"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d07a00"/>
    </marker>
  </defs>

  <rect width="1380" height="820" fill="#ffffff"/>
  <text x="40" y="48" class="title">gzjjzhy.com 部署图</text>
  <text x="40" y="78" class="small">重点展示公网入口端口与后端真实服务端口的映射关系</text>

  <rect x="40" y="130" width="230" height="210" class="group client"/>
  <text x="80" y="166" class="group-title">访问端</text>
  <rect x="70" y="200" width="170" height="48" class="box"/>
  <text x="95" y="230" class="text">Web / H5 / API</text>
  <rect x="70" y="270" width="170" height="48" class="box"/>
  <text x="91" y="300" class="text">Netty / TCP 客户端</text>

  <rect x="340" y="150" width="250" height="170" class="group dns"/>
  <text x="390" y="186" class="group-title">域名解析</text>
  <text x="375" y="220" class="text">api / h5 / mp / p</text>
  <text x="385" y="246" class="text">shop / test / wx</text>
  <text x="388" y="280" class="small">CNAME 到 CLB 域名</text>

  <rect x="680" y="110" width="300" height="250" class="group clb"/>
  <text x="735" y="146" class="group-title">腾讯云 CLB</text>
  <text x="714" y="174" class="small">lb-8l49ku5e / gzjjzhy.com</text>
  <rect x="720" y="205" width="220" height="58" class="box"/>
  <text x="770" y="230" class="text">HTTPS:443</text>
  <text x="748" y="252" class="small">*.gzjjzhy.com + /</text>
  <rect x="720" y="285" width="220" height="50" class="box"/>
  <text x="776" y="316" class="text">TCP:9080</text>

  <rect x="1070" y="80" width="270" height="285" class="group node"/>
  <text x="1135" y="116" class="group-title">linux2</text>
  <text x="1110" y="142" class="small">ins-8gxi9rgu</text>
  <text x="1100" y="166" class="small">公网 159.75.146.242</text>
  <text x="1106" y="188" class="small">内网 172.16.0.4</text>
  <rect x="1100" y="215" width="210" height="52" class="service"/>
  <text x="1134" y="238" class="text">Web/API:30008</text>
  <text x="1160" y="258" class="small">健康 / 权重 10</text>
  <rect x="1100" y="290" width="210" height="52" class="service"/>
  <text x="1138" y="313" class="text">Netty:30012</text>
  <text x="1160" y="333" class="small">健康 / 权重 10</text>

  <rect x="1070" y="430" width="270" height="285" class="group node"/>
  <text x="1135" y="466" class="group-title">linux1</text>
  <text x="1110" y="492" class="small">ins-p028dne4</text>
  <text x="1100" y="516" class="small">公网 119.29.228.216</text>
  <text x="1106" y="538" class="small">内网 172.16.0.2</text>
  <rect x="1100" y="565" width="210" height="52" class="service"/>
  <text x="1134" y="588" class="text">Web/API:30008</text>
  <text x="1160" y="608" class="small">健康 / 权重 10</text>
  <rect x="1100" y="640" width="210" height="52" class="service"/>
  <text x="1138" y="663" class="text">Netty:30012</text>
  <text x="1160" y="683" class="small">健康 / 权重 10</text>

  <path d="M240 224 C280 224, 300 210, 340 210" class="line"/>
  <path d="M240 294 C280 294, 300 270, 340 270" class="line"/>
  <path d="M590 210 C630 210, 645 230, 720 230" class="https"/>
  <path d="M590 270 C630 270, 645 310, 720 310" class="tcp"/>

  <path d="M940 234 C1000 234, 1020 241, 1100 241" class="https"/>
  <path d="M940 234 C1010 234, 1015 591, 1100 591" class="https"/>
  <path d="M940 310 C1000 310, 1020 316, 1100 316" class="tcp"/>
  <path d="M940 310 C1010 310, 1015 666, 1100 666" class="tcp"/>

  <rect x="608" y="194" width="92" height="26" class="badge443"/>
  <text x="620" y="212" class="badge-text">HTTPS 443</text>
  <rect x="608" y="286" width="92" height="26" class="badge9080"/>
  <text x="626" y="304" class="badge-text">TCP 9080</text>

  <rect x="982" y="198" width="92" height="26" class="badge443"/>
  <text x="993" y="216" class="badge-text">转 30008</text>
  <rect x="982" y="294" width="92" height="26" class="badge9080"/>
  <text x="993" y="312" class="badge-text">转 30012</text>

  <rect x="40" y="745" width="1300" height="45" class="group"/>
  <text x="68" y="773" class="text">核心映射：公网 HTTPS 443 -> 后端 30008；公网 TCP 9080 -> 后端 30012；linux1 与 linux2 权重相同，均为健康。</text>
</svg>
