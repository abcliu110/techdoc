<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 840" width="1280" height="840">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .layer { font-size: 12px; font-weight: 700; fill: #374151; letter-spacing: .04em; }
    .node-title { font-size: 16px; font-weight: 700; }
    .node-text { font-size: 12px; fill: #4b5563; }
    .label { font-size: 12px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="1280" height="840" fill="#ffffff"/>
  <text x="50" y="54" class="title">多租户 CRM 使用微信开放平台发送公众号模板消息架构</text>
  <text x="50" y="82" class="subtitle">模板消息按公众号隔离：每个授权公众号独立维护 template_id、openid、access_token 和发送日志。</text>

  <rect x="42" y="116" width="1196" height="126" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-dasharray="6,4"/>
  <text x="62" y="140" class="layer">商户授权入口</text>
  <rect x="95" y="164" width="190" height="48" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="190" y="193" text-anchor="middle" class="node-title">CRM 后台</text>
  <rect x="380" y="164" width="210" height="48" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="485" y="193" text-anchor="middle" class="node-title">授权二维码/链接</text>
  <rect x="685" y="164" width="210" height="48" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="790" y="193" text-anchor="middle" class="node-title">商户管理员扫码</text>
  <rect x="990" y="164" width="190" height="48" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="1085" y="193" text-anchor="middle" class="node-title">微信回调授权码</text>

  <rect x="42" y="286" width="1196" height="198" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-dasharray="6,4"/>
  <text x="62" y="310" class="layer">SaaS CRM 数据与配置层</text>
  <rect x="82" y="348" width="180" height="74" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="172" y="376" text-anchor="middle" class="node-title">租户表</text>
  <text x="172" y="400" text-anchor="middle" class="node-text">tenant_id / 商户主体</text>
  <rect x="315" y="348" width="210" height="74" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="420" y="376" text-anchor="middle" class="node-title">公众号授权表</text>
  <text x="420" y="400" text-anchor="middle" class="node-text">authorizer_appid / token</text>
  <rect x="578" y="348" width="210" height="74" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="683" y="376" text-anchor="middle" class="node-title">模板配置表</text>
  <text x="683" y="400" text-anchor="middle" class="node-text">scene_code / template_id</text>
  <rect x="841" y="348" width="180" height="74" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="931" y="376" text-anchor="middle" class="node-title">会员 openid 表</text>
  <text x="931" y="400" text-anchor="middle" class="node-text">appid + openid</text>
  <rect x="1068" y="348" width="130" height="74" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="1133" y="376" text-anchor="middle" class="node-title">发送日志</text>
  <text x="1133" y="400" text-anchor="middle" class="node-text">errcode / msgid</text>

  <rect x="42" y="530" width="1196" height="188" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-dasharray="6,4"/>
  <text x="62" y="554" class="layer">模板消息发送链路</text>
  <rect x="82" y="594" width="170" height="64" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="167" y="620" text-anchor="middle" class="node-title">业务事件</text>
  <text x="167" y="642" text-anchor="middle" class="node-text">消费/积分/券到账</text>
  <rect x="318" y="594" width="170" height="64" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="403" y="620" text-anchor="middle" class="node-title">消息任务</text>
  <text x="403" y="642" text-anchor="middle" class="node-text">去重/排队/重试</text>
  <rect x="554" y="594" width="170" height="64" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="639" y="620" text-anchor="middle" class="node-title">发送服务</text>
  <text x="639" y="642" text-anchor="middle" class="node-text">按 appid 取配置</text>
  <rect x="790" y="594" width="190" height="64" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="885" y="620" text-anchor="middle" class="node-title">公众号接口</text>
  <text x="885" y="642" text-anchor="middle" class="node-text">template/send</text>
  <rect x="1046" y="594" width="150" height="64" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="1121" y="620" text-anchor="middle" class="node-title">会员微信</text>
  <text x="1121" y="642" text-anchor="middle" class="node-text">收到模板消息</text>

  <path d="M 285 188 L 380 188" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 590 188 L 685 188" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 895 188 L 990 188" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 1085 212 L 1085 260 L 420 260 L 420 348" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="644" y="246" width="164" height="22" rx="4" fill="#ffffff" opacity=".96"/>
  <text x="726" y="262" text-anchor="middle" class="label">换取并保存授权信息</text>

  <path d="M 262 385 L 315 385" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 525 385 L 578 385" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 788 385 L 841 385" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 1021 385 L 1068 385" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <path d="M 252 626 L 318 626" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <path d="M 488 626 L 554 626" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <path d="M 724 626 L 790 626" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <path d="M 980 626 L 1046 626" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <path d="M 639 594 L 639 506 L 420 506 L 420 422" fill="none" stroke="#9333ea" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow-purple)"/>
  <path d="M 665 594 L 665 506 L 683 506 L 683 422" fill="none" stroke="#9333ea" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow-purple)"/>
  <path d="M 691 594 L 691 506 L 931 506 L 931 422" fill="none" stroke="#9333ea" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow-purple)"/>
  <path d="M 885 594 L 885 506 L 1133 506 L 1133 422" fill="none" stroke="#9333ea" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow-purple)"/>

  <rect x="42" y="746" width="1196" height="58" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <g transform="translate(66,770)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="44" y="4" class="label">授权交互</text>
    <line x1="150" y1="0" x2="184" y2="0" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="194" y="4" class="label">数据绑定</text>
    <line x1="312" y1="0" x2="346" y2="0" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="356" y="4" class="label">消息发送</text>
    <line x1="482" y1="0" x2="516" y2="0" stroke="#9333ea" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-purple)"/>
    <text x="526" y="4" class="label">发送时读取配置/记录日志</text>
  </g>
</svg>
