<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <style>
      text { font-family: Arial, Microsoft YaHei, PingFang SC, sans-serif; fill: #0f172a; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #475569; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .group-title { font-size: 18px; font-weight: 700; }
      .node { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 10; }
      .core { fill: #dbeafe; stroke: #2563eb; }
      .service { fill: #dcfce7; stroke: #16a34a; }
      .frontend { fill: #fef3c7; stroke: #d97706; }
      .shared { fill: #ede9fe; stroke: #7c3aed; }
      .label { font-size: 16px; font-weight: 700; }
      .small { font-size: 12px; fill: #334155; }
      .edge { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 6 4; }
      .legend { font-size: 12px; }
    </style>
  </defs>
  <rect x="0" y="0" width="1400" height="920" fill="#ffffff"/>
  <text x="700" y="40" text-anchor="middle" class="title">nms4cloud / nms4pos 项目关系架构图</text>
  <text x="700" y="66" text-anchor="middle" class="subtitle">基于仓库结构、接口前缀、Feign 目标与共享库依赖整理</text>

  <rect x="40" y="100" width="1320" height="180" class="group"/>
  <text x="60" y="130" class="group-title">前端层</text>
  <rect x="40" y="320" width="1320" height="300" class="group"/>
  <text x="60" y="350" class="group-title">后端服务层</text>
  <rect x="40" y="660" width="1320" height="200" class="group"/>
  <text x="60" y="690" class="group-title">共享与特殊仓</text>

  <rect x="80" y="160" width="180" height="74" class="node frontend"/>
  <text x="170" y="188" text-anchor="middle" class="label">nms4cloud-biz-ui</text>
  <text x="170" y="212" text-anchor="middle" class="small">后台 Web / /api/*</text>

  <rect x="290" y="160" width="180" height="74" class="node frontend"/>
  <text x="380" y="188" text-anchor="middle" class="label">nms4pos-ui</text>
  <text x="380" y="212" text-anchor="middle" class="small">POS 前端 / /api/sys/*</text>

  <rect x="500" y="160" width="180" height="74" class="node frontend"/>
  <text x="590" y="188" text-anchor="middle" class="label">taro-mall</text>
  <text x="590" y="212" text-anchor="middle" class="small">顾客侧 / 点餐商城</text>

  <rect x="710" y="160" width="180" height="74" class="node frontend"/>
  <text x="800" y="188" text-anchor="middle" class="label">uni4merchant</text>
  <text x="800" y="212" text-anchor="middle" class="small">商户端 / /api/sys/*</text>

  <rect x="920" y="160" width="180" height="74" class="node frontend"/>
  <text x="1010" y="188" text-anchor="middle" class="label">uni4pay</text>
  <text x="1010" y="212" text-anchor="middle" class="small">支付端 / pay wx mq</text>

  <rect x="90" y="390" width="220" height="90" class="node core"/>
  <text x="200" y="420" text-anchor="middle" class="label">nms4cloud</text>
  <text x="200" y="444" text-anchor="middle" class="small">主平台后端</text>
  <text x="200" y="462" text-anchor="middle" class="small">订单 / 支付 / 微信 / MQ / CRM</text>

  <rect x="360" y="390" width="200" height="90" class="node service"/>
  <text x="460" y="420" text-anchor="middle" class="label">nms4cloud-bi</text>
  <text x="460" y="444" text-anchor="middle" class="small">BI 服务名</text>
  <text x="460" y="462" text-anchor="middle" class="small">旧报表线</text>

  <rect x="610" y="390" width="240" height="90" class="node service"/>
  <text x="730" y="420" text-anchor="middle" class="label">nms4cloud-pos11report</text>
  <text x="730" y="444" text-anchor="middle" class="small">POS 报表重构版</text>
  <text x="730" y="462" text-anchor="middle" class="small">仍挂 nms4cloud-bi</text>

  <rect x="900" y="390" width="200" height="90" class="node service"/>
  <text x="1000" y="420" text-anchor="middle" class="label">nms4cloud-wms</text>
  <text x="1000" y="444" text-anchor="middle" class="small">WMS / 库存 / 成本</text>
  <text x="1000" y="462" text-anchor="middle" class="small">反调 BI 数据</text>

  <rect x="1140" y="390" width="180" height="90" class="node service"/>
  <text x="1230" y="420" text-anchor="middle" class="label">nms4pos</text>
  <text x="1230" y="444" text-anchor="middle" class="small">POS 后端体系</text>
  <text x="1230" y="462" text-anchor="middle" class="small">云端 / 设备 / 离线</text>

  <rect x="120" y="730" width="220" height="80" class="node shared"/>
  <text x="230" y="762" text-anchor="middle" class="label">web4share</text>
  <text x="230" y="786" text-anchor="middle" class="small">@nms/share 共享库</text>

  <rect x="410" y="730" width="220" height="80" class="node"/>
  <text x="520" y="762" text-anchor="middle" class="label">pos4install</text>
  <text x="520" y="786" text-anchor="middle" class="small">安装 / 部署辅助仓</text>

  <path d="M 170 234 L 200 390" class="edge"/>
  <path d="M 380 234 L 1230 390" class="edge"/>
  <path d="M 590 234 L 200 390" class="edge"/>
  <path d="M 800 234 L 200 390" class="edge dashed"/>
  <path d="M 1010 234 L 200 390" class="edge"/>

  <path d="M 340 770 L 170 234" class="edge dashed"/>
  <path d="M 340 770 L 800 234" class="edge dashed"/>
  <path d="M 340 770 L 1010 234" class="edge dashed"/>

  <path d="M 560 435 L 610 435" class="edge"/>
  <path d="M 850 435 L 900 435" class="edge"/>
  <path d="M 1090 435 L 1140 435" class="edge"/>
  <path d="M 1000 480 C 980 560, 760 560, 730 480" class="edge dashed"/>
  <rect x="770" y="528" width="98" height="24" fill="#ffffff" opacity="0.96" rx="4"/>
  <text x="819" y="544" text-anchor="middle" class="legend">/boss/paid</text>

  <rect x="180" y="500" width="180" height="70" fill="#ffffff" stroke="#cbd5e1" rx="8"/>
  <text x="270" y="522" text-anchor="middle" class="small">服务名示例</text>
  <text x="270" y="542" text-anchor="middle" class="small">nms4cloud-payment</text>
  <text x="270" y="560" text-anchor="middle" class="small">nms4cloud-wechat</text>
  <text x="270" y="578" text-anchor="middle" class="small">nms4cloud-order / nms4cloud-mq</text>

  <rect x="1030" y="715" width="290" height="118" fill="#ffffff" stroke="#cbd5e1" rx="8"/>
  <text x="1050" y="740" class="label">图例</text>
  <rect x="1050" y="754" width="18" height="12" class="node core"/>
  <text x="1080" y="765" class="legend">主平台核心服务</text>
  <rect x="1050" y="778" width="18" height="12" class="node service"/>
  <text x="1080" y="789" class="legend">独立业务服务</text>
  <rect x="1050" y="802" width="18" height="12" class="node frontend"/>
  <text x="1080" y="813" class="legend">前端应用</text>
  <rect x="1180" y="754" width="18" height="12" class="node shared"/>
  <text x="1210" y="765" class="legend">共享库</text>
  <line x1="1180" y1="785" x2="1210" y2="785" class="edge"/>
  <text x="1220" y="789" class="legend">主要依赖 / 调用</text>
  <line x1="1180" y1="809" x2="1210" y2="809" class="edge dashed"/>
  <text x="1220" y="813" class="legend">共享 / 间接 / 反向调用</text>
</svg>
