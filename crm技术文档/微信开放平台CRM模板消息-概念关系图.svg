<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .layer { font-size: 12px; font-weight: 700; fill: #374151; letter-spacing: .04em; }
    .node-title { font-size: 17px; font-weight: 700; }
    .node-text { font-size: 13px; fill: #4b5563; }
    .small { font-size: 12px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="50" y="54" class="title">微信开放平台、公众平台、小程序、公众号与 SaaS CRM 的关系</text>
  <text x="50" y="82" class="subtitle">核心结论：公众号和小程序归公众平台管理；开放平台第三方平台负责多主体授权；开发者平台提供文档、接口、调试和工具。</text>

  <rect x="44" y="118" width="1112" height="146" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-dasharray="6,4"/>
  <text x="64" y="142" class="layer">微信官方平台层</text>
  <rect x="85" y="166" width="250" height="70" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="210" y="193" text-anchor="middle" class="node-title">开发者平台</text>
  <text x="210" y="217" text-anchor="middle" class="node-text">文档 / API / 调试 / 工具</text>

  <rect x="475" y="166" width="250" height="70" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="600" y="193" text-anchor="middle" class="node-title">公众平台</text>
  <text x="600" y="217" text-anchor="middle" class="node-text">公众号 / 小程序后台管理</text>

  <rect x="865" y="166" width="250" height="70" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="990" y="193" text-anchor="middle" class="node-title">开放平台</text>
  <text x="990" y="217" text-anchor="middle" class="node-text">第三方平台 / 多账号授权</text>

  <rect x="44" y="306" width="1112" height="164" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-dasharray="6,4"/>
  <text x="64" y="330" class="layer">商户微信资产层</text>
  <rect x="225" y="360" width="250" height="74" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="350" y="388" text-anchor="middle" class="node-title">商户公众号</text>
  <text x="350" y="412" text-anchor="middle" class="node-text">服务号 / 订阅号，按公众号 openid 触达会员</text>

  <rect x="725" y="360" width="250" height="74" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="850" y="388" text-anchor="middle" class="node-title">商户小程序</text>
  <text x="850" y="412" text-anchor="middle" class="node-text">小程序 AppID，按小程序 openid 服务用户</text>

  <rect x="44" y="512" width="1112" height="170" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-dasharray="6,4"/>
  <text x="64" y="536" class="layer">SaaS CRM 业务层</text>
  <rect x="145" y="572" width="210" height="72" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="250" y="600" text-anchor="middle" class="node-title">租户 tenant_id</text>
  <text x="250" y="624" text-anchor="middle" class="node-text">商户 / 门店 / 品牌隔离</text>

  <rect x="495" y="572" width="210" height="72" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="600" y="600" text-anchor="middle" class="node-title">授权账号</text>
  <text x="600" y="624" text-anchor="middle" class="node-text">authorizer_appid + token</text>

  <rect x="845" y="572" width="210" height="72" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="950" y="600" text-anchor="middle" class="node-title">CRM 会员</text>
  <text x="950" y="624" text-anchor="middle" class="node-text">tenant_id + appid + openid</text>

  <path d="M 990 236 L 990 300 L 850 300 L 850 360" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="877" y="286" width="144" height="22" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="949" y="302" text-anchor="middle" class="small">第三方平台授权</text>

  <path d="M 990 236 L 990 292 L 350 292 L 350 360" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="504" y="278" width="144" height="22" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="576" y="294" text-anchor="middle" class="small">第三方平台授权</text>

  <path d="M 600 236 L 600 260 L 350 260 L 350 360" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="395" y="247" width="132" height="22" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="461" y="263" text-anchor="middle" class="small">后台配置公众号</text>

  <path d="M 600 236 L 600 260 L 850 260 L 850 360" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="672" y="247" width="132" height="22" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="738" y="263" text-anchor="middle" class="small">后台配置小程序</text>

  <path d="M 210 236 L 210 492 L 600 492 L 600 572" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="270" y="478" width="202" height="22" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="371" y="494" text-anchor="middle" class="small">开发者按官方接口实现</text>

  <path d="M 350 434 L 350 498 L 600 498 L 600 572" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 850 434 L 850 498 L 600 498 L 600 572" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 355 608 L 495 608" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 705 608 L 845 608" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <g transform="translate(64,706)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="44" y="4" class="small">授权/账号关系</text>
    <line x1="174" y1="0" x2="208" y2="0" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="218" y="4" class="small">管理/绑定关系</text>
    <line x1="360" y1="0" x2="394" y2="0" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="404" y="4" class="small">开发实现依据</text>
  </g>
</svg>
